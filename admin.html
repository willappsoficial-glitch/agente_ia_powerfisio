<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxGym - Comando Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5500;
            --primary-hover: #E64D00;
            --bg: #060709;
            --bg-card: #0D0F14;
            --bg-input: #13161E;
            --border: rgba(255,255,255,0.08);
            --text: #FFFFFF;
            --muted: #6B7280;
            --success: #00FF88;
            --danger: #FF3333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header img { width: 80px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,85,0,0.2); margin-bottom: 15px; }
        .header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; }
        .header h1 span { color: var(--primary); }
        .header p { color: var(--muted); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; }

        .search-box {
            display: flex; gap: 10px; width: 100%; max-width: 600px; margin-bottom: 30px;
        }
        .search-box input {
            flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: #fff;
            padding: 15px 20px; border-radius: 12px; font-family: 'Barlow', sans-serif; font-size: 1.1rem; outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }
        .btn-buscar {
            background: var(--primary); border: none; color: #fff; padding: 0 25px; border-radius: 12px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-buscar:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .dashboard {
            width: 100%; max-width: 900px; display: none; gap: 20px; grid-template-columns: 1fr 1fr;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .card-header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 5px; }
        .card-header .material-icons { color: var(--primary); }
        .card-header h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .form-group input, .form-group select, .form-group textarea {
            background: var(--bg-input); border: 1px solid var(--border); color: #fff;
            padding: 12px; border-radius: 8px; font-family: 'Barlow', sans-serif; outline: none;
        }
        .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Toggles de Saúde */
        .grid-saude { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-toggle {
            background: var(--bg-input); border: 1px solid var(--border); color: var(--muted);
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 0.9rem;
        }
        .btn-toggle.ativo { background: rgba(255,51,51,0.1); border-color: var(--danger); color: var(--danger); }

        .full-width { grid-column: 1 / -1; }

        .btn-salvar {
            background: linear-gradient(135deg, var(--primary), #FF8C00); border: none; color: #fff;
            padding: 18px; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700;
            letter-spacing: 2px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 20px; box-shadow: 0 10px 20px rgba(255,85,0,0.3);
        }
        .btn-salvar:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255,85,0,0.4); }

        /* Info Badge */
        .info-badge { display: flex; justify-content: space-between; align-items: center; background: rgba(255,85,0,0.05); padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,85,0,0.2); margin-top: 10px; }
        .info-badge strong { color: var(--primary); font-size: 1.2rem; }

        #loading { display: none; color: var(--primary); margin-top: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; letter-spacing: 2px; }

        @media (max-width: 800px) {
            .dashboard { grid-template-columns: 1fr; }
            .grid-saude { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" alt="MaxGym Logo" onerror="this.style.display='none'">
        <h1>MAX<span>GYM</span></h1>
        <p>Comando Centralização e Controlo</p>
    </div>

    <div class="search-box">
        <input type="text" id="inputBusca" placeholder="ID EVO, CPF ou Nome do Aluno..." onkeypress="if(event.key === 'Enter') buscarAluno()">
        <button class="btn-buscar" onclick="buscarAluno()">BUSCAR</button>
    </div>

    <div id="loading">SINCRONIZANDO DADOS...</div>

    <div class="dashboard" id="painelDashboard">
        
        <div class="card">
            <div class="card-header">
                <span class="material-icons">account_circle</span>
                <h2>Dados Cadastrais</h2>
            </div>
            
            <div class="form-group">
                <label>ID EVO</label>
                <input type="text" id="alunoId" disabled>
            </div>
            <div class="form-group">
                <label>Nome do Aluno</label>
                <input type="text" id="alunoNome">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="text" id="alunoZap" placeholder="Ex: 84999999999">
            </div>
            <div class="form-group">
                <label>Nível na IA (Max)</label>
                <select id="alunoNivel">
                    <option value="Iniciante 1">Iniciante 1</option>
                    <option value="Iniciante 2">Iniciante 2</option>
                    <option value="Iniciante 3">Iniciante 3</option>
                    <option value="Intermediário 1">Intermediário 1</option>
                    <option value="Intermediário 2">Intermediário 2</option>
                    <option value="Intermediário 3">Intermediário 3</option>
                    <option value="Avançado 1">Avançado 1</option>
                    <option value="Avançado 2">Avançado 2</option>
                    <option value="Avançado 3">Avançado 3</option>
                    <option value="Nível Power">Nível Power</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="material-icons">medical_services</span>
                <h2>Prontuário Clínico</h2>
            </div>
            
            <div class="grid-saude">
                <button class="btn-toggle" onclick="toggleBtn(this)">Hérnia de Disco</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Escoliose</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Hipertensão</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Condromalácia</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Labirintite</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Gestante</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Pós-Cirúrgico</button>
                <button class="btn-toggle" onclick="toggleBtn(this)">Diabetes</button>
            </div>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>Observações Adicionais (IA vai ler isto)</label>
                <textarea id="alunoObs" placeholder="Ex: Limitação de carga no agachamento, evitar impacto..."></textarea>
            </div>
        </div>

        <div class="card full-width" style="flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center;">
            <div style="flex: 1; min-width: 250px;">
                <div class="card-header" style="border: none; padding: 0; margin: 0;">
                    <span class="material-icons">security</span>
                    <h2>Acesso & Gamificação</h2>
                </div>
                <div class="info-badge">
                    <span>Pontos Atuais no Ranking:</span>
                    <strong id="alunoPontos">0</strong>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-toggle" style="border-color: var(--primary); color: var(--primary);" onclick="ajustarPontos(15)">+ Dar 15 Pontos</button>
                <button class="btn-toggle" style="border-color: var(--success); color: var(--success);" onclick="liberarCatracaManual()">Liberar App (Manual)</button>
            </div>
        </div>

        <button class="btn-salvar full-width" onclick="salvarTudo()">SALVAR DADOS DO ALUNO</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";

        function toggleBtn(btn) {
            btn.classList.toggle('ativo');
        }

        function mostrarLoading(mostrar) {
            document.getElementById('loading').style.display = mostrar ? 'block' : 'none';
            document.getElementById('painelDashboard').style.display = mostrar ? 'none' : 'grid';
            if(mostrar) document.getElementById('painelDashboard').style.display = 'none';
        }

        async function buscarAluno() {
            const termo = document.getElementById('inputBusca').value.trim();
            if (!termo) return alert("Digite um ID, CPF ou Nome");

            mostrarLoading(true);

            try {
                // Criaremos esta nova rota no code.gs
                const res = await fetch(`${API_URL}?acao=buscarAdminCompleto&query=${encodeURIComponent(termo)}`);
                const dados = await res.json();

                if (dados && dados.id) {
                    // Preenche Dados Cadastrais
                    document.getElementById('alunoId').value = dados.id;
                    document.getElementById('alunoNome').value = dados.nome || "";
                    document.getElementById('alunoZap').value = dados.celular || "";
                    
                    if (dados.nivel) {
                        const selectNivel = document.getElementById('alunoNivel');
                        for(let i=0; i < selectNivel.options.length; i++) {
                            if(selectNivel.options[i].value === dados.nivel) {
                                selectNivel.selectedIndex = i; break;
                            }
                        }
                    }

                    // Preenche Saúde
                    const condicoesSalvas = dados.saude_condicoes ? dados.saude_condicoes.split(",") : [];
                    document.querySelectorAll('.grid-saude .btn-toggle').forEach(btn => {
                        if (condicoesSalvas.includes(btn.innerText)) btn.classList.add('ativo');
                        else btn.classList.remove('ativo');
                    });
                    document.getElementById('alunoObs').value = dados.saude_obs || "";

                    // Preenche Gamificação
                    document.getElementById('alunoPontos').innerText = dados.pontos || "0";

                    mostrarLoading(false);
                } else {
                    alert("Aluno não encontrado no sistema ou na EVO.");
                    mostrarLoading(false);
                    document.getElementById('painelDashboard').style.display = 'none';
                }
            } catch (e) {
                alert("Erro de conexão.");
                mostrarLoading(false);
            }
        }

        async function salvarTudo() {
            const id = document.getElementById('alunoId').value;
            if (!id) return;

            const btnSalvar = document.querySelector('.btn-salvar');
            btnSalvar.innerText = "A SALVAR...";
            btnSalvar.style.opacity = "0.7";

            // Coleta Saúde
            const botoesAtivos = document.querySelectorAll('.grid-saude .btn-toggle.ativo');
            const condicoesSelecionadas = Array.from(botoesAtivos).map(btn => btn.innerText).join(",");
            const obs = document.getElementById('alunoObs').value;

            // Coleta Dados
            const payload = {
                acao: 'salvarAdminCompleto',
                id: id,
                nome: document.getElementById('alunoNome').value,
                celular: document.getElementById('alunoZap').value,
                nivel: document.getElementById('alunoNivel').value,
                condicoes: condicoesSelecionadas,
                observacoes: obs
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const resultado = await res.text();
                
                if (resultado.includes("Sucesso")) {
                    btnSalvar.innerText = "✅ SALVO COM SUCESSO";
                    btnSalvar.style.background = "var(--success)";
                    setTimeout(() => {
                        btnSalvar.innerText = "SALVAR DADOS DO ALUNO";
                        btnSalvar.style.background = "linear-gradient(135deg, var(--primary), #FF8C00)";
                        btnSalvar.style.opacity = "1";
                    }, 3000);
                } else {
                    alert("Erro ao salvar: " + resultado);
                    btnSalvar.innerText = "SALVAR DADOS DO ALUNO";
                    btnSalvar.style.opacity = "1";
                }
            } catch (e) {
                alert("Erro de conexão.");
                btnSalvar.innerText = "SALVAR DADOS DO ALUNO";
                btnSalvar.style.opacity = "1";
            }
        }

        function ajustarPontos(quantidade) {
            alert(`Funcionalidade de adicionar ${quantidade} pontos entrará na v2!`);
        }

        async function liberarCatracaManual() {
            const id = document.getElementById('alunoId').value;
            if(!id) return alert("Busque um aluno primeiro.");
            
            try {
                await fetch(`${API_URL}?acao=liberarAppManual&id=${id}`);
                alert("App liberado com sucesso para uso do treino!");
            } catch(e) { alert("Erro ao liberar."); }
        }
    </script>
</body>
</html>
