<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Powerfisio - Max Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5500;
            --bg-dark: #0F1115;
            --bg-card: #1A1D24;
            --text-main: #FFFFFF;
            --text-muted: #8B92A5;
            --success: #00FF88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .screen { display: none; flex-direction: column; padding: 30px 20px; animation: slideUp 0.4s ease-out; flex: 1; }
        .screen.active { display: flex; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LOGIN --- */
        .brand { text-align: center; margin-bottom: 40px; margin-top: 15vh; }
        .brand h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -2px; }
        .brand span { color: var(--primary); }

        .input-group { margin-bottom: 20px; }
        input {
            width: 100%; background: var(--bg-card); border: 1px solid #2A2F3A; padding: 18px; 
            border-radius: 16px; color: white; font-size: 1rem; outline: none; text-align: center;
        }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px;
            font-weight: 800; text-transform: uppercase; width: 100%; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 85, 0, 0.2);
            transition: 0.3s;
        }

        /* --- BLOQUEADO --- */
        .lock-icon { font-size: 5rem; margin-bottom: 20px; text-align: center; }
        .status-card { background: var(--bg-card); padding: 30px; border-radius: 24px; text-align: center; border: 1px dashed var(--primary); }

        /* --- TREINO --- */
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { display: flex; align-items: center; gap: 10px; }
        .user-badge .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        .workout-card { background: var(--bg-card); border-radius: 24px; padding: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* --- ESTILOS DOS CARDS DE EXERCÍCIO --- */
        .exercise-item {
            display: flex; align-items: flex-start; padding: 15px; border-bottom: 1px solid #2A2F3A;
            border-radius: 16px; transition: all 0.3s ease; margin-bottom: 12px;
            border: 1px solid transparent;
        }
        
        .exercise-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        
        .ex-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .ex-header h4 { font-size: 0.95rem; margin: 0; line-height: 1.3; font-weight: 700; color: #FFF; }
        
        .ex-body { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

        .tag-id { background: #2A2F3A; color: #8B92A5; font-size: 0.65rem; padding: 3px 6px; border-radius: 6px; font-weight: 900; white-space: nowrap; border: 1px solid #3A404D; }

        .tag-series { background: rgba(255, 85, 0, 0.15); color: var(--primary); font-weight: 900; padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; border: 1px solid rgba(255, 85, 0, 0.3); }

        .tag-tech { 
            background: rgba(0, 255, 136, 0.1); color: var(--success); 
            font-size: 0.75rem; font-weight: 800; padding: 3px 8px; 
            border-radius: 6px; border: 1px dashed rgba(0, 255, 136, 0.3); 
            text-transform: uppercase; cursor: help;
        }

        .exercise-item.pendente { border-color: rgba(255, 85, 0, 0.4); background: rgba(255, 85, 0, 0.05); cursor: pointer; }
        .exercise-item.concluido { opacity: 0.4; border-color: var(--success); background: rgba(0, 255, 136, 0.05); cursor: pointer; }
        .exercise-item.concluido .ex-header h4 { text-decoration: line-through; }
        
        .exercise-checkbox { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; border: 2px solid #555; margin-right: 15px; margin-top: 2px; display: none; align-items: center; justify-content: center; }
        .exercise-item.pendente .exercise-checkbox { display: flex; border-color: var(--primary); }
        .exercise-item.concluido .exercise-checkbox { display: flex; background: var(--success); border-color: var(--success); }
        .exercise-item.concluido .exercise-checkbox::after { content: '✓'; color: black; font-weight: bold; font-size: 14px; }

        /* --- MODAL DE TÉCNICA (BALÃOZINHO) --- */
        #modal-tecnica {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-card); padding: 25px; border-radius: 24px;
            border: 2px solid var(--primary); width: 100%; max-width: 320px;
            text-align: center; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: var(--success); margin-bottom: 10px; text-transform: uppercase; }
        .modal-content p { font-size: 0.9rem; line-height: 1.5; color: #CCC; margin-bottom: 20px; }

        /* Cronómetro */
        #painel-treino-ativo { text-align: center; margin-bottom: 20px; display: none; }
        #cronometro { font-size: 3rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; }

        .ranking-bar { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <div id="modal-tecnica" onclick="fecharModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-titulo">Técnica</h3>
            <p id="modal-desc">Explicação aqui...</p>
            <button class="btn-main" onclick="fecharModal()">ENTENDI!</button>
        </div>
    </div>

    <div id="screen-login" class="screen active">
        <div class="brand">
            <img src="logo.jpeg" alt="Logo Powerfisio" style="max-width: 120px; margin-bottom: 15px; border-radius: 10px;">
            <h1>POWER<span>FISIO</span></h1>
            <p style="color: var(--text-muted)">Portal do Aluno - Max IA</p>
        </div>
        <div class="input-group">
            <input type="tel" id="alunoCpf" placeholder="Digite seu CPF (apenas números)">
        </div>
        <button class="btn-main" onclick="fazerLogin()">Entrar na Arena</button>
    </div>

    <div id="screen-locked" class="screen">
        <div class="header-app">
            <div class="user-badge">
                <div class="avatar" id="avatar-letra">W</div>
                <div><h3 id="user-welcome">Olá!</h3><p style="font-size: 0.7rem; color: var(--text-muted)">Aguardando...</p></div>
            </div>
        </div>
        <div class="status-card">
            <div class="lock-icon">🔒</div><h2 style="margin-bottom: 10px;">MISSÃO BLOQUEADA</h2>
            <p style="color: var(--text-muted)">O Max já preparou tudo. Passe a digital na catraca para liberar o seu treino!</p>
        </div>
        <div class="ranking-bar" id="txt-ranking">Carregando posição...</div>
    </div>

    <div id="screen-workout" class="screen">
        <div class="header-app"><h2 id="dia-titulo" style="color:var(--primary);">TREINO</h2></div>

        <div id="painel-treino-ativo">
            <div id="cronometro">00:00</div>
            <p style="color: var(--text-muted); font-size: 0.7rem; font-weight: bold; letter-spacing: 1px;">TEMPO DE TREINO</p>
        </div>

        <div class="workout-card">
            <div id="lista-exercicios"></div>
        </div>

        <button id="btn-iniciar-treino" class="btn-main" onclick="iniciarTreinoInterativo()">COMEÇAR TREINO 🚀</button>
        <button id="btn-concluir-treino" class="btn-main" style="background: var(--success); color: black; display: none;" onclick="concluirMissao()">CONCLUIR MISSÃO ✅</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        
        let AlunoLogado = { id: "", nome: "", cpf: "", posicao: "" };
        let radarAppInterval;
        let tempoSegundos = 0;
        let timerId;

        // DICIONÁRIO DE TÉCNICAS (BALÃOZINHO)
        const TECNICAS = {
            "DROP-SET": "Realize o exercício até a falha, diminua o peso (aprox. 20%) e continue imediatamente sem descanso até a nova falha.",
            "BI-SET": "Realize dois exercícios diferentes para o mesmo músculo (ou antagonistas) sem descanso entre eles.",
            "TRI-SET": "Combine três exercícios diferentes sem descanso entre as séries. Alta intensidade metabólica!",
            "REST-PAUSE": "Treine até a falha, descanse apenas 15 segundos e faça mais algumas repetições com o mesmo peso.",
            "CLUSTER": "Divida a série em pequenos blocos (ex: 4+4+4) com 10-15s de pausa entre eles para manter a carga máxima.",
            "ISOMETRIA": "Mantenha o músculo contraído na posição de maior esforço pelo tempo indicado, sem se mover."
        };

        async function fazerLogin() {
            const cpfInput = document.getElementById('alunoCpf');
            const btn = document.querySelector('#screen-login .btn-main');
            const cpf = cpfInput.value.replace(/\D/g, '');
            if(cpf.length < 11) return alert("Digite um CPF válido.");
            btn.innerText = "⏳ AUTENTICANDO..."; btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}?acao=loginApp&cpf=${cpf}`);
                const dados = await res.json();
                if(dados.sucesso) {
                    AlunoLogado = { id: dados.id, nome: dados.nome, cpf: cpf, posicao: dados.posicao };
                    document.getElementById('user-welcome').innerText = `Olá, ${dados.nome}!`;
                    document.getElementById('avatar-letra').innerText = dados.nome.charAt(0);
                    document.getElementById('txt-ranking').innerHTML = `Você está em <strong>${dados.posicao}º lugar</strong> no ranking! 🔥`;
                    trocarTela('screen-locked');
                    radarAppInterval = setInterval(checarDesbloqueio, 5000);
                } else { alert("❌ CPF não encontrado."); }
            } catch(e) { alert("Erro de ligação."); } 
            finally { btn.innerText = "ENTRAR NA ARENA"; btn.disabled = false; }
        }

        function trocarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function checarDesbloqueio() {
            try {
                const res = await fetch(`${API_URL}?acao=checkCatracaApp&idAluno=${AlunoLogado.id}`);
                const dados = await res.json();
                if (dados.desbloqueado) { clearInterval(radarAppInterval); carregarTreinoDaAPI(); }
            } catch(e) {}
        }

        async function carregarTreinoDaAPI() {
            trocarTela('screen-workout');
            const listaDiv = document.getElementById('lista-exercicios');
            listaDiv.innerHTML = `<h3 style="text-align:center; color: var(--primary);">🤖 Gerando missão...</h3>`;
            
            const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
            const diaHoje = diasSemana[new Date().getDay()];
            document.getElementById('dia-titulo').innerText = diaHoje.toUpperCase();

            try {
                const res = await fetch(`${API_URL}?acao=gerarTreinoMax&idAluno=${AlunoLogado.id}&dia=${diaHoje}`);
                
                // 🕵️‍♂️ DETETIVE: Verifica se o Google devolveu uma página de erro em vez de dados
                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    const textoErro = await res.text();
                    throw new Error("O Google Script falhou e devolveu texto. Verifique se há erros no Código.gs ou se a API_URL está correta.");
                }

                const treino = await res.json();

                if (treino.sucesso) {
                    let HTML = `<p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">${treino.cabecalho}</p>`;
                    const linhas = treino.conteudo.split('\n');
                    
                    linhas.forEach(linha => {
                        let textoLimpo = linha.replace(/\*\*/g, '').trim();
                        if(textoLimpo === "") return;
                        
                        if(textoLimpo.toLowerCase().includes("como executar") || textoLimpo.toLowerCase().includes("nota clínica")) {
                            HTML += `<h4 style="color: var(--text-muted); margin-top: 25px; margin-bottom: 10px; font-size: 0.8rem; border-bottom: 1px solid #222;">${textoLimpo}</h4>`;
                        } 
                        else if (/^\d/.test(textoLimpo)) {
                            const regexTreino = /^\d+\.\s*(.+?)\s*\[ID:\s*(\d+)\]\s*-\s*(.+)/i;
                            const match = textoLimpo.match(regexTreino);

                            if (match) {
                                let exNome = match[1];
                                let exID = match[2];
                                let exResto = match[3];

                                exResto = exResto.replace(/(\d+\s*[xX]\s*\d+(?:\s*(?:a|-)\s*\d+)?)/g, '<span class="tag-series">$1</span>');
                                
                                exResto = exResto.replace(/\(([^)]+)\)/g, (match, p1) => {
                                    return `<span class="tag-tech" onclick="abrirModalTecnica('${p1}')">${p1}</span>`;
                                });

                                HTML += `
                                <div class="exercise-item unstarted">
                                    <div class="exercise-checkbox"></div>
                                    <div class="exercise-info">
                                        <div class="ex-header">
                                            <h4>${exNome}</h4>
                                            <span class="tag-id">ID: ${exID}</span>
                                        </div>
                                        <div class="ex-body">${exResto}</div>
                                    </div>
                                </div>`;
                            } else {
                                HTML += `<div class="exercise-item unstarted"><div class="exercise-checkbox"></div><div class="exercise-info"><h4>${textoLimpo}</h4></div></div>`;
                            }
                        } else {
                            HTML += `<p style="font-size: 0.85rem; color: #CCC; margin-bottom: 5px; line-height: 1.4;">${textoLimpo}</p>`;
                        }
                    });
                    listaDiv.innerHTML = HTML;
                } else {
                    // 🌟 SE O MAX REPORTAR UM ERRO DE LÓGICA (ex: IA fora do ar)
                    listaDiv.innerHTML = `<div style="padding: 15px; border-radius: 12px; background: rgba(255,0,0,0.1); border: 1px solid red;">
                        <h4 style="color: red; margin-bottom: 10px;">⚠️ O Max encontrou um problema:</h4>
                        <p style="font-size: 0.9rem;">${treino.conteudo}</p>
                    </div>`;
                }
            } catch(e) { 
                // 🌟 MOSTRA O ERRO REAL NA TELA EM VEZ DA MENSAGEM GENÉRICA
                listaDiv.innerHTML = `<div style="padding: 15px; border-radius: 12px; background: rgba(255,85,0,0.1); border: 1px solid var(--primary);">
                    <h4 style="color: var(--primary); margin-bottom: 10px;">🛠️ Falha Técnica</h4>
                    <p style="font-size: 0.85rem; word-break: break-all;"><strong>Detalhe:</strong> ${e.message}</p>
                </div>`; 
                console.error(e);
            }
        }
        // FUNÇÃO PARA MARCAR EXERCÍCIOS (FIXED)
        function iniciarTreinoInterativo() {
            document.getElementById('btn-iniciar-treino').style.display = 'none';
            document.getElementById('painel-treino-ativo').style.display = 'block';
            document.getElementById('btn-concluir-treino').style.display = 'block';

            // Seleciona todos os itens e anexa o clique
            const itens = document.querySelectorAll('.exercise-item');
            itens.forEach(item => {
                item.classList.remove('unstarted');
                item.classList.add('pendente');
                
                item.onclick = function(e) {
                    // Evita marcar se clicar na etiqueta de técnica
                    if(e.target.classList.contains('tag-tech')) return;
                    
                    this.classList.toggle('pendente');
                    this.classList.toggle('concluido');
                };
            });

            tempoSegundos = 0;
            timerId = setInterval(() => {
                tempoSegundos++;
                let m = String(Math.floor(tempoSegundos / 60)).padStart(2, '0');
                let s = String(tempoSegundos % 60).padStart(2, '0');
                document.getElementById('cronometro').innerText = `${m}:${s}`;
            }, 1000);
        }

        // FUNÇÕES DO MODAL
        function abrirModalTecnica(nome) {
            const nomeFormatado = nome.toUpperCase();
            document.getElementById('modal-titulo').innerText = nomeFormatado;
            document.getElementById('modal-desc').innerText = TECNICAS[nomeFormatado] || "Técnica avançada para aumentar a intensidade do treino. Consulte o professor para detalhes de execução.";
            document.getElementById('modal-tecnica').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal-tecnica').style.display = 'none';
        }

        async function concluirMissao() {
            if(confirm("Parabéns! Missão cumprida por hoje?")) {
                clearInterval(timerId); 
                const btn = document.getElementById('btn-concluir-treino');
                btn.innerText = "A GUARDAR..."; btn.disabled = true;
                try {
                    const res = await fetch(`${API_URL}?acao=concluirTreinoApp&idAluno=${AlunoLogado.id}&cpf=${AlunoLogado.cpf}&nome=${AlunoLogado.nome}`);
                    const resp = await res.json(); 
                    alert(resp.sucesso ? "BOA! +1 Ponto! 🎉💪" : "🛑 " + resp.mensagem);
                    location.reload(); 
                } catch(e) {
                    alert("Erro ao gravar.");
                    btn.innerText = "CONCLUIR MISSÃO ✅"; btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
