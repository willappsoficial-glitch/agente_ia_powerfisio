<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxGym - Cadastro de Aluno</title>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --texto: #f8fafc;
            --texto-mutado: #94a3b8;
            --primaria: #2563eb;
            --primaria-hover: #1d4ed8;
            --borda: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background-color: var(--bg-card); width: 100%; max-width: 800px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        h2 { margin-bottom: 6px; font-size: 28px; color: var(--texto); }
        p.subtitle { color: var(--texto-mutado); margin-bottom: 30px; font-size: 14px; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; font-weight: 600; color: var(--texto-mutado); }
        
        input, select {
            background-color: var(--bg-principal);
            border: 1px solid var(--borda);
            color: var(--texto);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primaria); }
        input[readonly] { background-color: rgba(15, 23, 42, 0.5); color: var(--texto-mutado); cursor: not-allowed; }

        .btn-container { margin-top: 30px; display: flex; justify-content: flex-end; }
        button {
            background-color: var(--primaria);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--primaria-hover); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Novo Cadastro MaxGym</h2>
    <p class="subtitle">Insira os dados do aluno para salvar diretamente no banco de dados local.</p>
    
    <form id="formCadastro">
        <div class="form-grid">
            
            <div class="form-group">
                <label for="idBusca">ID do Cliente (Matrícula)</label>
                <input type="text" id="idBusca" required placeholder="Ex: 85943">
            </div>

            <div class="form-group">
                <label for="cpfDoAluno">CPF</label>
                <input type="text" id="cpfDoAluno" required placeholder="000.000.000-00" maxlength="14">
            </div>

            <div class="form-group">
                <label for="pNome">Nome</label>
                <input type="text" id="pNome" required placeholder="Primeiro nome">
            </div>

            <div class="form-group">
                <label for="pSobrenome">Sobrenome</label>
                <input type="text" id="pSobrenome" required placeholder="Sobrenome completo">
            </div>

            <div class="form-group">
                <label for="genero">Gênero</label>
                <select id="genero" required>
                    <option value="">Selecione...</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dataNasc">Data de Nascimento</label>
                <input type="date" id="dataNasc" required>
            </div>

            <div class="form-group">
                <label for="idade">Idade</label>
                <input type="number" id="idade" readonly placeholder="Calculada automaticamente">
            </div>

            <div class="form-group">
                <label for="celular">N° do Celular</label>
                <input type="text" id="celular" required placeholder="(00) 00000-0000" maxlength="15">
            </div>

            <div class="form-group full-width">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="aluno@email.com">
            </div>

            <div class="form-group full-width">
                <label for="fotoDoAluno">URL da Foto</label>
                <input type="url" id="fotoDoAluno" placeholder="https://linkdafoto.com/perfil.jpg">
            </div>

            <div class="form-group full-width">
                <label for="nivel">Nível de Treino</label>
                <select id="nivel" required>
                    <option value="Iniciante 1">Iniciante 1</option>
                    <option value="Iniciante 2">Iniciante 2</option>
                    <option value="Intermediário 1">Intermediário 1</option>
                    <option value="Intermediário 2">Intermediário 2</option>
                    <option value="Avançado">Avançado</option>
                </select>
            </div>

        </div>

        <div class="btn-container">
            <button type="submit" id="btnSalvar">Salvar Cadastro</button>
        </div>
    </form>
</div>

<script>
    // URL do seu Web App implantado no Google Apps Script
    const WEB_APP_URL = "SUA_URL_DE_IMPLANTACAO_AQUI";

    // Cálculo automático de Idade
    document.getElementById('dataNasc').addEventListener('change', function() {
        const dataNasc = new Date(this.value);
        if(isNaN(dataNasc)) return;
        const hoje = new Date();
        let idade = hoje.getFullYear() - dataNasc.getFullYear();
        const m = hoje.getMonth() - dataNasc.getMonth();
        if (m < 0 || (m === 0 && hoje.getDate() < dataNasc.getDate())) {
            idade--;
        }
        document.getElementById('idade').value = idade;
    });

    // Máscara de CPF
    document.getElementById('cpfDoAluno').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        e.target.value = v;
    });

    // Máscara de Celular
    document.getElementById('celular').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d{5})(\d)/, "$1-$2");
        e.target.value = v;
    });

    // Envio dos dados via POST para a API do Google Sheets
    document.getElementById('formCadastro').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        // Formata a data de YYYY-MM-DD para DD/MM/YYYY antes de enviar
        const rawDataNasc = document.getElementById('dataNasc').value;
        const [ano, mes, dia] = rawDataNasc.split('-');
        const dataFormatada = `${dia}/${mes}/${ano}`;

        const dadosForm = {
            acao: "cadastrarAlunoLocal",
            idBusca: document.getElementById('idBusca').value.trim(),
            pNome: document.getElementById('pNome').value.trim(),
            pSobrenome: document.getElementById('pSobrenome').value.trim(),
            genero: document.getElementById('genero').value,
            idade: document.getElementById('idade').value,
            dataNasc: dataFormatada,
            celular: document.getElementById('celular').value.replace(/\D/g, ""), // Salva apenas números
            email: document.getElementById('email').value.trim(),
            fotoDoAluno: document.getElementById('fotoDoAluno').value.trim(),
            cpfDoAluno: document.getElementById('cpfDoAluno').value.replace(/\D/g, ""), // Salva apenas números
            nivel: document.getElementById('nivel').value
        };

        try {
            const resposta = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Necessário para evitar bloqueio de CORS no Google Apps Script
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dadosForm)
            });

            alert("Aluno cadastrado com sucesso na base MaxGym!");
            document.getElementById('formCadastro').reset();
            document.getElementById('idade').value = "";
        } catch (erro) {
            alert("Erro ao conectar com o servidor do banco de dados.");
            console.error(erro);
        } finally {
            btn.innerText = "Salvar Cadastro";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
