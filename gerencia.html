<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master App - MAXGYM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --p: #FF5500; 
            --bg: #0B0D14; 
            --card: #1A1D2A; 
            --txt: #ffffff; 
            --muted: #8B92A5;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--txt); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* HEADER APP */
        .app-header { 
            background: var(--card); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }
        .logo { font-weight: 900; font-size: 1.2rem; color: var(--txt); letter-spacing: -0.5px; }
        .logo span { color: var(--p); }
        .btn-add { 
            background: var(--p); 
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 0.8rem;
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255,85,0,0.3);
        }

        /* ÁREA DE CONTEÚDO */
        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 90px;
        }
        .titulo-secao { font-size: 1.1rem; color: var(--muted); margin-bottom: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;}

        /* BARRA DE PESQUISA */
        .search-container {
            display: flex; align-items: center; background: var(--card);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 20px;
            padding: 0 15px; height: 45px;
        }
        .search-icon { color: var(--muted); font-size: 1.4rem; margin-right: 10px; }
        #input-pesquisa {
            flex: 1; background: transparent; border: none; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; width: 100%;
        }
        #input-pesquisa::placeholder { color: rgba(255,255,255,0.3); }

        /* TABELA BASE (COMPUTADOR) */
        .table-wrapper {
            background: var(--card);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th { background: rgba(0,0,0,0.2); padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        .action-btn { background: none; border: none; cursor: pointer; color: var(--muted); margin-right: 10px; transition: 0.2s; }
        .btn-edit:hover, .btn-edit:active { color: #00E676; }
        .btn-del:hover, .btn-del:active { color: #FF3D00; }
        .td-acoes { white-space: nowrap; }

        /* MENU INFERIOR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 29, 42, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            padding: 10px 2px 20px 2px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--muted);
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }
        .nav-item .material-icons { 
            font-size: 1.4rem; 
            margin-bottom: 4px; 
            transition: 0.3s; 
            text-transform: none !important; 
        }
        .nav-item span:not(.material-icons) { 
            font-size: 0.50rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            text-align: center;
        }
        .nav-item.active { color: var(--p); }
        .nav-item.active .material-icons { transform: translateY(-3px); text-shadow: 0 4px 10px rgba(255,85,0,0.4); }

        /* MODAL DE EDIÇÃO */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 16px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 6px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .field input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Inter'; font-size: 0.9rem; }
        .field input:focus { outline: none; border-color: var(--p); }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-salvar { flex: 2; background: var(--p); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .btn-cancelar { flex: 1; background: #2A2F42; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .loading-text { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .spin { animation: rodar 1s linear infinite; }
        @keyframes rodar { to { transform: rotate(360deg); } }

        /* MÁGICA MOBILE: LAYOUT DE CARTÕES */
        @media (max-width: 768px) {
            .table-wrapper { background: transparent; border: none; box-shadow: none; overflow: visible; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { background: var(--card); margin-bottom: 15px; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
            td { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; text-align: right; word-break: break-word; white-space: normal; }
            td:last-child { border-bottom: none; }
            td::before { content: attr(data-label); font-weight: 800; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; margin-right: 15px; text-align: left; flex-shrink: 0; }
            .td-acoes { justify-content: flex-end; gap: 15px; padding-bottom: 12px; margin-bottom: 5px; border-bottom: 2px solid rgba(255,255,255,0.05); }
            .td-acoes::before { display: none; }
            .action-btn { margin-right: 0; padding: 5px; }
            .btn-edit { color: #00E676; }
            .btn-del { color: #FF3D00; }
        }
    </style>
</head>
<body>

    <div id="trava-master-painel" style="position: fixed; inset: 0; background: #080A0F; z-index: 999999; display: flex; align-items: center; justify-content: center; font-family: 'Barlow', sans-serif; padding: 20px;">
    <div style="background: #111318; border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; color: #FFF; letter-spacing: 1px; margin-bottom: 5px;">ACESSO RESTRITO</h2>
        <p style="color: #6B7280; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 30px;">Painel de Controle MaxGym</p>
        
        <div style="text-align: left; margin-bottom: 20px;">
            <label style="font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; color: #6B7280; text-transform: uppercase; margin-bottom: 10px; display: block;">Chave Master de Autenticação</label>
            <input type="password" id="input-senha-master" placeholder="••••••••••••" style="width: 100%; background: #181C24; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px; color: white; font-size: 1.2rem; text-align: center; outline: none; transition: 0.2s;">
        </div>
        
        <button id="btn-entrar-master" onclick="validarAcessoMaster()" style="width: 100%; background: #FF5500; color: white; border: none; border-radius: 14px; padding: 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 24px rgba(255,85,0,0.3);">CONECTAR 🚀</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // Executa assim que a página começa a carregar
    (function() {
        const autenticado = sessionStorage.getItem('maxgym_painel_autenticado');
        if (autenticado === 'true') {
            const trava = document.getElementById('trava-master-painel');
            if (trava) trava.style.display = 'none';
        }
    })();

    // Permite apertar "Enter" no teclado para logar
    document.getElementById('input-senha-master').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') validarAcessoMaster();
    });

    function validarAcessoMaster() {
        const btn = document.getElementById('btn-entrar-master');
        const input = document.getElementById('input-senha-master');
        const senhaDigitada = input.value;
        
        if (!senhaDigitada) return;

        // Feedback visual de que o botão foi clicado
        btn.textContent = "VERIFICANDO...";
        
        try {
            // Gera o Hash criptografado
            const hashDigitado = CryptoJS.SHA256(senhaDigitada).toString();
            // Senha padrão atual: MaxAdmin2026
            const hashCorreto = "f86ba52f75e2f7b8cfd0b28e5dbec03f9055745778893ccf9a6296317bc216d7"; 
            
            if (hashDigitado === hashCorreto) {
                // Sucesso!
                sessionStorage.setItem('maxgym_painel_autenticado', 'true');
                
                const trava = document.getElementById('trava-master-painel');
                trava.style.transition = 'opacity 0.3s ease';
                trava.style.opacity = '0';
                
                // Reduzido para 300ms para ser praticamente instantâneo!
                setTimeout(() => { trava.style.display = 'none'; }, 300);
                
                if (typeof carregarDadosIniciais === "function") carregarDadosIniciais();
                
            } else {
                // Erro na senha
                btn.innerHTML = "CONECTAR 🚀"; // Volta o botão ao normal
                input.value = '';
                input.focus();

                // Usa o SweetAlert se existir, ou o Alerta padrão se a biblioteca falhar
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: 'CHAVE INVÁLIDA',
                        text: 'A senha master informada está incorreta.',
                        icon: 'error',
                        confirmButtonColor: '#FF5500'
                    });
                } else {
                    alert("⚠️ CHAVE INVÁLIDA! A senha master informada está incorreta.");
                }
            }
        } catch(erro) {
            // Se a biblioteca de criptografia não carregar por problema de internet
            alert("Erro no sistema de segurança. Verifique a sua conexão com a internet.");
            btn.innerHTML = "CONECTAR 🚀";
        }
    }
</script>
    <header class="app-header">
        <div class="logo">MAXGYM <span>ERP</span></div>
        <button class="btn-add" onclick="abrirForm()">+ NOVO</button>
    </header>

    <main class="content-area">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="titulo-aba" class="titulo-secao">ALUNOS MAX</h2>
        </div>

        <div class="search-container">
            <span class="material-icons search-icon">search</span>
            <input type="text" id="input-pesquisa" placeholder="Pesquisar registro..." oninput="filtrarTabela()">
        </div>
        
        <div class="table-wrapper">
            <table id="tabela-master">
                <thead id="thead"></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="mudarAba('Alunos_Max', this)">
            <span class="material-icons">groups</span>
            <span>Alunos</span>
        </div>
        <div class="nav-item" onclick="mudarAba('Exercicios', this)">
            <span class="material-icons">fitness_center</span>
            <span>Exercícios</span>
        </div>
        <div class="nav-item" onclick="mudarAba('Ranking', this)">
            <span class="material-icons">emoji_events</span>
            <span>Ranking</span>
        </div>
        <div class="nav-item" onclick="mudarAba('Saude', this)">
            <span class="material-icons">favorite</span>
            <span>Saúde</span>
        </div>
        <div class="nav-item" onclick="mudarAba('MemoriaTreinos', this)">
            <span class="material-icons">psychology</span>
            <span>Treinos</span>
        </div>
        <div class="nav-item" onclick="mudarAba('Log_Webhook', this)">
            <span class="material-icons">data_array</span>
            <span>Logs</span>
        </div>
    </nav>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-titulo">Editar Registro</h3>
            <form id="form-universal">
                <input type="hidden" id="field-rowIdx">
                <div id="form-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">CANCELAR</button>
                    <button type="button" class="btn-salvar" onclick="salvar()">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🚨 COLOQUE A SUA URL AQUI - A MESMA QUE JÁ ESTAVA USANDO!
        const API = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec"; 
        
        let abaAtual = "Alunos_Max";
        let colunasAtuais = [];
        let linhasAtuais = []; // 💾 Variável para guardar os dados da aba atual

        // 🔄 TRADUTOR VISUAL DE COLUNAS
        function nomeVisual(coluna) {
            if (coluna === "CPF") return "ID DO ALUNO";
            if (coluna === "QTD_TREINOS") return "PONTOS";
            return coluna;
        }

        async function mudarAba(nome, elemento) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            elemento.classList.add('active');
            abaAtual = nome;
            document.getElementById('titulo-aba').innerText = nome.replace('_', ' ');
            document.getElementById('input-pesquisa').value = ""; // Limpa a barra ao trocar de aba
            carregarDados();
        }

        async function carregarDados() {
            document.getElementById('thead').innerHTML = "";
            document.getElementById('tbody').innerHTML = `<tr><td colspan="10" class="loading-text"><span class="material-icons spin">sync</span> Sincronizando com o Cérebro...</td></tr>`;
            
            try {
                const res = await fetch(`${API}?acao=getDadosAba&aba=${abaAtual}`);
                const data = await res.json();
                
                if(data.erro) {
                    document.getElementById('tbody').innerHTML = `<tr><td colspan="10" class="loading-text" style="color:#ff4444">${data.erro}</td></tr>`;
                    return;
                }

                colunasAtuais = data.cabecalho;
                linhasAtuais = data.linhas; // Salva as linhas na memória
                
                let theadHTML = '<tr><th>AÇÕES</th>';
                colunasAtuais.forEach(coluna => theadHTML += `<th>${nomeVisual(coluna)}</th>`);
                theadHTML += '</tr>';
                document.getElementById('thead').innerHTML = theadHTML;

                renderizarTabela(linhasAtuais); // Chama a função para desenhar a tabela

            } catch(e) { 
                document.getElementById('tbody').innerHTML = `<tr><td colspan="10" class="loading-text" style="color:#ff4444">Falha na conexão.</td></tr>`;
            }
        }

        // 🎨 FUNÇÃO SEPARADA PARA DESENHAR A TABELA
        function renderizarTabela(linhas) {
            let tbodyHTML = '';
            
            if (linhas.length === 0) {
                tbodyHTML = `<tr><td colspan="10" class="loading-text" style="color:var(--muted)">Nenhum registro encontrado.</td></tr>`;
            }

            linhas.forEach(linha => {
                tbodyHTML += `<tr>`;
                
                tbodyHTML += `<td data-label="AÇÕES" class="td-acoes">
                    <button class="action-btn btn-edit" onclick='abrirForm(${JSON.stringify(linha).replace(/'/g, "&#39;")})'><span class="material-icons">edit</span></button>
                    <button class="action-btn btn-del" onclick="excluir(${linha.rowIdx})"><span class="material-icons">delete</span></button>
                </td>`;
                
                colunasAtuais.forEach(coluna => {
                    let valor = linha[coluna] || "";
                    let strValor = String(valor).toLowerCase();
                    
                    if(strValor.startsWith("http")) {
                        let colUpper = coluna.toUpperCase();
                        if(colUpper.includes("FOTO") || colUpper.includes("VIDEO") || colUpper.includes("GIF") || colUpper.includes("IMAGEM") || strValor.match(/\.(jpeg|jpg|gif|png)/i)) {
                            valor = `<img src="${valor}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--p); box-shadow: 0 2px 10px rgba(255,85,0,0.2);">`;
                        } else {
                            valor = `<a href="${valor}" target="_blank" style="color:var(--p); text-decoration:none;">🔗 Abrir Link</a>`;
                        }
                    }
                    
                    tbodyHTML += `<td data-label="${nomeVisual(coluna)}">${valor}</td>`;
                });
                tbodyHTML += `</tr>`;
            });
            document.getElementById('tbody').innerHTML = tbodyHTML;
        }

        // 🔎 MOTOR DE PESQUISA INSTANTÂNEA
        function filtrarTabela() {
            const termo = document.getElementById('input-pesquisa').value.toLowerCase();
            
            if (termo === "") {
                renderizarTabela(linhasAtuais); // Se estiver vazio, mostra tudo
                return;
            }

            // Procura o termo em qualquer coluna daquela linha
            const filtrados = linhasAtuais.filter(linha => {
                return colunasAtuais.some(coluna => {
                    const valor = linha[coluna];
                    return valor && String(valor).toLowerCase().includes(termo);
                });
            });

            renderizarTabela(filtrados);
        }

        function abrirForm(dados = null) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-titulo').innerText = dados ? "Editar Registro" : "Novo Registro";
            document.getElementById('field-rowIdx').value = dados ? dados.rowIdx : "";
            
            let fieldsHtml = '';
            colunasAtuais.forEach(coluna => {
                let valor = dados ? (dados[coluna] || "") : "";
                fieldsHtml += `
                    <div class="field">
                        <label>${nomeVisual(coluna)}</label>
                        <input type="text" name="${coluna}" value="${valor}">
                    </div>`;
            });
            document.getElementById('form-fields').innerHTML = fieldsHtml;
        }

        async function salvar() {
            const btn = document.querySelector('.btn-salvar');
            btn.innerHTML = "SALVANDO...";
            
            const formData = new FormData(document.getElementById('form-universal'));
            const payload = {
                acao: 'salvarLinha',
                aba: abaAtual,
                rowIdx: document.getElementById('field-rowIdx').value,
                dados: Object.fromEntries(formData)
            };

            await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            btn.innerHTML = "SALVAR";
            fecharModal();
            carregarDados();
        }

        async function excluir(idx) {
            if(!confirm("Atenção! Deseja apagar permanentemente este registro da planilha?")) return;
            const payload = { acao: 'excluirLinha', aba: abaAtual, rowIdx: idx };
            await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            carregarDados();
        }

        function fecharModal() { 
            document.getElementById('modal').style.display = 'none'; 
        }
        
        carregarDados();
    </script>
</body>
</html>
