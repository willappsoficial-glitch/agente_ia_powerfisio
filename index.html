<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Totem - PowerFisio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF5500">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Totem PF">
    <link rel="apple-touch-icon" href="pflogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="tela-busca" class="tela active">
        <header class="main-header">
            <button id="btn-instalar-app" style="display: none; background: #FF5500; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin: 0 auto 20px auto;">
            <span class="material-icons">get_app</span> Instalar no Tablet
        </button>
            <img src="pflogo.png" alt="PowerFisio" class="logo-app">
            <h1>GUIA DE EXECUÇÃO</h1>
            <p>Digite o número da máquina/exercício</p>
        </header>

        <div class="display-container">
            <div id="display-numero" class="display-vazio">_ _ _</div>
            <div id="erro-msg" class="erro-escondido">❌ ID não encontrado</div>
        </div>

        <div id="loading-search" class="status-msg">
            <span class="material-icons spin">sync</span> Sincronizando sistema...
        </div>

        <div class="teclado-grid">
            <button class="btn-tecla" onclick="digitar('1')">1</button>
            <button class="btn-tecla" onclick="digitar('2')">2</button>
            <button class="btn-tecla" onclick="digitar('3')">3</button>
            <button class="btn-tecla" onclick="digitar('4')">4</button>
            <button class="btn-tecla" onclick="digitar('5')">5</button>
            <button class="btn-tecla" onclick="digitar('6')">6</button>
            <button class="btn-tecla" onclick="digitar('7')">7</button>
            <button class="btn-tecla" onclick="digitar('8')">8</button>
            <button class="btn-tecla" onclick="digitar('9')">9</button>
            <button class="btn-tecla btn-apagar" onclick="apagar()"><span class="material-icons">backspace</span></button>
            <button class="btn-tecla" onclick="digitar('0')">0</button>
            <button class="btn-tecla btn-buscar" onclick="buscarExercicio()">IR <span class="material-icons">chevron_right</span></button>
        </div>
    </div>

    <div id="tela-video" class="tela hidden">
        <div class="video-header">
            <div>
                <span class="badge-ref">REF: <span id="ex-id">0</span></span>
                <h2 id="ex-nome">NOME DO EXERCÍCIO</h2>
            </div>
            <button id="btn-fechar" class="btn-fechar-video" onclick="fecharVideo()">
                <span class="material-icons">close</span> VOLTAR
            </button>
        </div>
        
        <div class="media-fullscreen">
            <div id="media-content"></div>
        </div>
        
        <div class="dica-max">
            <span class="material-icons icone-dica">lightbulb</span>
            <p id="ex-dica">Mantenha a postura correta e contraia o abdômen.</p>
        </div>
    </div>

    <script src="script.js?v=totem"></script>
    <script>
        // 1. Inicia o PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // 2. SEQUESTRA O EVENTO DE INSTALAÇÃO DO ANDROID
        let eventoInstalacao;
        const btnInstalar = document.getElementById('btn-instalar-app');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            eventoInstalacao = e;
            btnInstalar.style.display = 'flex';
        });

        // 3. O QUE ACONTECE QUANDO CLICA NO NOSSO BOTÃO (Versão blindada para tablets antigos)
        btnInstalar.addEventListener('click', () => {
            if (!eventoInstalacao) {
                return;
            }

            try {
                // Dispara a janela oficial sem usar 'async/await'
                eventoInstalacao.prompt();
                
                // Pega a resposta do usuário no formato antigo e compatível
                eventoInstalacao.userChoice.then((resultado) => {
                    if (resultado.outcome === 'accepted') {
                        btnInstalar.style.display = 'none';
                    }
                    eventoInstalacao = null;
                });
            } catch (erro) {
                // Se o tablet surtar, ele te avisa na tela!
                alert("O sistema do tablet bloqueou o clique. Tente ir nos 3 pontinhos e 'Adicionar à tela inicial'.");
            }
        });
    </script>
</body>
</html>
