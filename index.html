<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerFisio - Guia de Execução</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header class="main-header">
            <img src="pflogo.png" alt="PowerFisio" class="logo-app">
            <h1>Guia de Execução</h1>
            <p>Digite o número da sua ficha</p>
        </header>

        <div class="search-box">
            <input type="number" id="input-id" placeholder="Ex: 45" autofocus>
            <button id="btn-buscar">
                <span class="material-icons">search</span>
            </button>
        </div>

        <div id="status-area">
            <div id="loading-search" class="status-msg">
                <span class="material-icons spin">sync</span> Carregando base de dados...
            </div>
            <div id="erro" class="status-msg hidden error">
                <span class="material-icons">error_outline</span> Exercício não encontrado
            </div>
        </div>

        <div id="resultado" class="card hidden">
            <div class="card-header">
                <h2 id="ex-nome">NOME DO EXERCÍCIO</h2>
                <span class="badge-ref">Ref: <span id="ex-id">0</span></span>
            </div>
            
            <div class="media-wrapper">
                <div id="media-content"></div>
            </div>
            
            <div class="card-footer">
                <p>💡 <span id="ex-dica">Carregando dica...</span></p>
            </div>
            
            <button id="btn-nova-busca" class="btn-fechar-resultado">Nova Busca</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
