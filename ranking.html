<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Powerfisio - TV Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5500;
            --bg: #060709;
            --bg-card: rgba(13,15,20,0.8);
            --border: rgba(255,255,255,0.05);
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: #fff;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* 🛡️ GARANTIA: Nada vaza para o lado */
            position: relative;
        }

        /* Fundo Atmosférico */
        body::before {
            content: ''; position: fixed; top: -30%; left: 50%; transform: translateX(-50%);
            width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(255,85,0,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ======= HEADER ======= */
        .header { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 15px 3vw; flex-shrink: 0; position: relative; }
        .header-logo { width: 55px; height: 55px; border-radius: 15px; box-shadow: 0 8px 24px rgba(255,85,0,0.25); cursor: pointer; }
        .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .header-title span { color: var(--primary); }
        .header-subtitle { font-size: 0.65rem; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
        
        .live-badge {
            position: absolute; right: 3vw; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; padding: 6px 12px;
            font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
        }
        .live-dot { width: 6px; height: 6px; background: #00FF88; border-radius: 50%; animation: livePulse 2s infinite; }
        @keyframes livePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ======= BARRA DE PESQUISA ======= */
        .search-container {
            display: flex; align-items: center; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 12px; margin: 0 15px 15px;
            padding: 0 12px; height: 45px; z-index: 10;
        }
        .search-icon { color: var(--primary); font-size: 1.2rem; margin-right: 8px; }
        #input-pesquisa { flex: 1; background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; }

        /* ======= GRID DO RANKING ======= */
        .ranking-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 30px;
            padding: 0 3vw 80px; flex: 1; overflow-y: auto;
        }

        /* ======= RANK CARD ======= */
        .rank-card {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            border-radius: 16px; background: var(--bg-card);
            border: 1px solid var(--border); border-left: 5px solid transparent;
        }

        .rank-card.gold { border-left-color: var(--gold); }
        .rank-card.silver { border-left-color: var(--silver); }
        .rank-card.bronze { border-left-color: var(--bronze); }
        .rank-card.other { border-left-color: rgba(255,255,255,0.1); }

        .pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; width: 45px; text-align: center; flex-shrink: 0; color: rgba(255,255,255,0.15); }
        .rank-card.gold .pos-num { color: var(--gold); }
        .rank-card.silver .pos-num { color: var(--silver); }
        .rank-card.bronze .pos-num { color: var(--bronze); }

        .rank-avatar, .rank-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .rank-avatar { border: 2px solid rgba(255,255,255,0.1); }
        .rank-avatar-placeholder { background: rgba(255,85,0,0.1); display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--primary); border: 1px solid rgba(255,85,0,0.2); }

        .rank-name {
            flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700;
            text-transform: uppercase; color: #E2E8F0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; /* ✂️ CORTA O NOME SE NÃO COUBER */
            min-width: 0; 
        }

        .rank-points { display: flex; flex-direction: column; align-items: center; background: rgba(255,85,0,0.1); border-radius: 10px; padding: 4px 12px; flex-shrink: 0; min-width: 70px; }
        .pts-value { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .pts-label { font-size: 0.55rem; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: 700; }

        /* ======= RODAPÉ TV ======= */
        #scroll-bar { position: fixed; bottom: 0; left: 0; width: 100vw; height: 50px; background: #000; border-top: 1px solid var(--primary); display: none; align-items: center; overflow: hidden; z-index: 100; }
        #scroll-content { display: inline-flex; align-items: center; white-space: nowrap; animation: scrollLeft linear infinite; }
        @keyframes scrollLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* =========================================================
           📱 AJUSTES CRÍTICOS PARA CELULAR (SEM SCROLL LATERAL)
           ========================================================= */
        @media (max-width: 800px) {
            .header { padding: 12px 15px; justify-content: flex-start; gap: 15px; }
            .header-logo { width: 45px; height: 45px; }
            .header-title { font-size: 2.2rem; }
            .live-badge { display: none; }
            
            .search-container { margin: 0 10px 15px; }
            
            .ranking-grid {
                grid-template-columns: 1fr; /* 1 Coluna única */
                padding: 0 10px 20px;
                gap: 8px;
            }

            .rank-card { 
                gap: 10px; 
                padding: 8px 12px; 
                width: 100%; /* Força o card a respeitar a largura da tela */
            }

            .pos-num { width: 35px; font-size: 1.4rem; }
            .rank-avatar, .rank-avatar-placeholder { width: 40px; height: 40px; }
            .rank-name { font-size: 1.1rem; } /* Nome menor para caber melhor */
            .rank-points { min-width: 65px; padding: 4px 8px; }
            .pts-value { font-size: 1.5rem; }
            
            #scroll-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" class="header-logo" alt="Logo" onclick="toggleFullScreen()">
        <div>
            <div class="header-title">POWER<span>FISIO</span></div>
            <div class="header-subtitle">Ranking de Frequência</div>
        </div>
        <div class="live-badge"><div class="live-dot"></div> Ao Vivo</div>
    </div>

    <div class="search-container">
        <span class="material-icons search-icon">search</span>
        <input type="text" id="input-pesquisa" placeholder="Pesquisar atleta..." oninput="filtrarRanking()">
    </div>

    <div class="ranking-grid" id="board">
        <div style="grid-column:1/-1; text-align:center; padding-top:50px; color:var(--primary); font-family:'Barlow Condensed'; letter-spacing:2px;">SINCRONIZANDO...</div>
    </div>

    <div id="scroll-bar"><div id="scroll-content"></div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        let dadosGlobais = [];

        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`);
                dadosGlobais = await res.json();
                filtrarRanking();
            } catch(e) { console.error(e); }
        }

        function filtrarRanking() {
            const termo = document.getElementById('input-pesquisa').value.toLowerCase();
            const board = document.getElementById('board');
            const filtrados = termo === "" ? dadosGlobais : dadosGlobais.filter(a => a.nome.toLowerCase().includes(termo));

            if (!filtrados.length) {
                board.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding-top:50px; opacity:0.3; letter-spacing:2px;">NENHUM RESULTADO</div>`;
                return;
            }

            let html = '';
            // No celular, mostramos mais itens se houver pesquisa, na TV focamos no Top 10
            const limite = (window.innerWidth <= 800 || termo !== "") ? filtrados.length : 10;
            
            filtrados.slice(0, limite).forEach(aluno => {
                let cls = 'other';
                if (aluno.posicao == 1) cls = 'gold';
                else if (aluno.posicao == 2) cls = 'silver';
                else if (aluno.posicao == 3) cls = 'bronze';

                const iniciais = aluno.nome.charAt(0);
                const fotoHtml = aluno.foto ? `<img src="${aluno.foto}" class="rank-avatar">` : `<div class="rank-avatar-placeholder">${iniciais}</div>`;

                html += `
                <div class="rank-card ${cls}">
                    <div class="pos-num">${aluno.posicao}º</div>
                    ${fotoHtml}
                    <div class="rank-name">${aluno.nome}</div>
                    <div class="rank-points">
                        <div class="pts-value">${aluno.pontos}</div>
                        <div class="pts-label">pts</div>
                    </div>
                </div>`;
            });
            board.innerHTML = html;
        }

        carregarRanking();
        setInterval(carregarRanking, 30000);

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
