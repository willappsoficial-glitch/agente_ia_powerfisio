<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Powerfisio - TV Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#060709">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --primary: #FF5500;
            --bg: #060709;
            --bg-card: rgba(13,15,20,0.8);
            --border: rgba(255,255,255,0.05);
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: #fff;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* 🔒 MÁGICA 1: Tranca o scroll horizontal de vez */
            position: relative;
        }

        body::before {
            content: ''; position: fixed; top: -30%; left: 50%; transform: translateX(-50%);
            width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(255,85,0,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; opacity: 0.5;
        }

        /* ======= HEADER ======= */
        .header { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 16px 3vw 12px; flex-shrink: 0; position: relative; }
        .header-logo { width: 64px; height: 64px; border-radius: 18px; box-shadow: 0 8px 24px rgba(255,85,0,0.25); cursor: pointer; }
        .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 3.2rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .header-title span { color: var(--primary); }
        .header-subtitle { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }
        
        .live-badge {
            position: absolute; right: 3vw; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; padding: 8px 16px;
            font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
        }
        .live-dot { width: 8px; height: 8px; background: #00FF88; border-radius: 50%; box-shadow: 0 0 8px #00FF88; animation: livePulse 2s ease-in-out infinite; }
        @keyframes livePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; box-shadow: 0 0 14px #00FF88; } }
        .header-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,85,0,0.3), transparent); margin: 0 3vw 15px; flex-shrink: 0; }

        /* ======= BARRA DE PESQUISA ======= */
        .search-container {
            display: flex; align-items: center; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 12px; margin: 0 3vw 15px;
            padding: 0 15px; height: 45px; z-index: 10; flex-shrink: 0;
        }
        .search-icon { color: var(--primary); font-size: 1.4rem; margin-right: 10px; }
        #input-pesquisa {
            flex: 1; background: transparent; border: none; color: #fff;
            font-family: 'Barlow', sans-serif; font-size: 1.1rem; outline: none; width: 100%;
        }
        #input-pesquisa::placeholder { color: rgba(255,255,255,0.3); }

        /* ======= GRID DO RANKING (TV) ======= */
        .ranking-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-flow: row; 
            gap: 12px 40px; padding: 0 3vw 80px; flex: 1; overflow-y: auto;
        }
        .ranking-grid::-webkit-scrollbar { display: none; }

        /* ======= RANK CARD (TV) ======= */
        .rank-card {
            display: flex; align-items: center; gap: 14px; padding: 12px 18px 12px 12px;
            border-radius: 16px; background: var(--bg-card); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-left: 5px solid transparent; width: 100%;
        }

        .rank-card.gold { border-left-color: var(--gold); background: linear-gradient(90deg, rgba(255,215,0,0.08), var(--bg-card) 50%); }
        .rank-card.silver { border-left-color: var(--silver); background: linear-gradient(90deg, rgba(192,192,192,0.06), var(--bg-card) 50%); }
        .rank-card.bronze { border-left-color: var(--bronze); background: linear-gradient(90deg, rgba(205,127,50,0.06), var(--bg-card) 50%); }
        .rank-card.other { border-left-color: rgba(255,255,255,0.08); }

        .pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; font-weight: 900; width: 52px; text-align: center; flex-shrink: 0; color: rgba(255,255,255,0.15); }
        .rank-card.gold .pos-num { color: var(--gold); }
        .rank-card.silver .pos-num { color: var(--silver); }
        .rank-card.bronze .pos-num { color: var(--bronze); }

        .rank-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.1); }
        .rank-card.gold .rank-avatar { border-color: var(--gold); }
        .rank-card.silver .rank-avatar { border-color: var(--silver); }
        .rank-card.bronze .rank-avatar { border-color: var(--bronze); }
        .rank-avatar-placeholder { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,85,0,0.15); border: 2px solid rgba(255,85,0,0.2); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900; color: var(--primary); flex-shrink: 0; }

        .rank-name {
            flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; color: #E2E8F0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .rank-points { display: flex; flex-direction: column; align-items: center; background: rgba(255,85,0,0.08); border: 1px solid rgba(255,85,0,0.15); border-radius: 12px; padding: 6px 14px; flex-shrink: 0; min-width: 80px; }
        .pts-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .pts-label { font-size: 0.6rem; color: rgba(255,170,136,0.7); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* ======= SCROLLING BAR (Rodapé da TV) ======= */
        #scroll-bar { position: fixed; bottom: 0; left: 0; width: 100vw; height: 58px; background: rgba(6,7,9,0.97); border-top: 1px solid rgba(255,85,0,0.25); display: none; align-items: center; overflow: hidden; z-index: 100; }
        #scroll-content { display: inline-flex; align-items: center; white-space: nowrap; padding-left: 100vw; animation: scrollLeft linear infinite; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .scroll-item { display: inline-flex; align-items: center; gap: 12px; margin-right: 120px; }
        .scroll-pos { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 900; color: rgba(255,255,255,0.25); }
        .scroll-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .scroll-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.55); }
        .scroll-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 900; color: rgba(255,85,0,0.6); }
        .scroll-sep { color: rgba(255,255,255,0.1); margin: 0 20px; }

        /* =========================================================
           📱 MÁGICA CELULAR (ZERO SCROLL HORIZONTAL)
           ========================================================= */
        @media (max-width: 800px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .header { padding: 15px; justify-content: flex-start; gap: 15px; }
            .header-logo { width: 48px; height: 48px; }
            .header-title { font-size: 2.2rem; }
            .live-badge { display: none; }
            
            .search-container { margin: 0 15px 15px; }
            
            .ranking-grid {
                grid-template-columns: 1fr; /* 🔒 Lista de 1 Coluna */
                gap: 10px;
                padding: 0 15px 20px 15px; /* Margens contidas */
            }

            .rank-card { 
                padding: 10px; 
                gap: 10px; 
                width: 100%; /* Respeita o ecrã */
            }

            .pos-num { font-size: 1.6rem; width: 35px; }
            .rank-avatar, .rank-avatar-placeholder { width: 45px; height: 45px; font-size: 1.2rem;}
            
            .rank-name { 
                font-size: 1.1rem; 
                /* 🔒 MÁGICA 2: Deixa o nome quebrar em 2 linhas se for muito grande, sem empurrar a tela */
                white-space: normal; 
                line-height: 1.1;
                display: -webkit-box;
                -webkit-line-clamp: 2; 
                -webkit-box-orient: vertical;
            }
            
            .rank-points { min-width: 65px; padding: 4px 8px; }
            .pts-value { font-size: 1.6rem; }
            
            #scroll-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" class="header-logo" alt="Logo" onclick="toggleFullScreen()" onerror="this.style.display='none'">
        <div>
            <div class="header-title">POWER<span>FISIO</span></div>
            <div class="header-subtitle">Ranking de Frequência</div>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            Ao Vivo
        </div>
    </div>

    <div class="header-divider"></div>

    <div class="search-container">
        <span class="material-icons search-icon">search</span>
        <input type="text" id="input-pesquisa" placeholder="Pesquisar atleta..." oninput="filtrarRanking()">
    </div>

    <div class="ranking-grid" id="board">
        <div style="grid-column:1/-1; display:flex; align-items:center; justify-content:center; color:var(--primary); font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; letter-spacing:2px; padding-top: 50px;">
            SINCRONIZANDO COM O CÉREBRO MAX...
        </div>
    </div>

    <div id="scroll-bar">
        <div id="scroll-content"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        let dadosGlobais = [];

        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`);
                dadosGlobais = await res.json();
                filtrarRanking();
            } catch(e) { console.error("Erro ao carregar ranking:", e); }
        }

        function filtrarRanking() {
            const termo = document.getElementById('input-pesquisa').value.toLowerCase();
            const board = document.getElementById('board');
            const scrollBar = document.getElementById('scroll-bar');
            const scrollContent = document.getElementById('scroll-content');
            
            let filtrados = dadosGlobais;
            if (termo !== "") filtrados = dadosGlobais.filter(a => a.nome.toLowerCase().includes(termo));

            if (!filtrados.length) {
                board.innerHTML = `<div style="grid-column:1/-1; display:flex; justify-content:center; padding-top: 50px; color:rgba(255,255,255,0.3); font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; letter-spacing:2px;">NENHUM ATLETA ENCONTRADO</div>`;
                scrollBar.style.display = 'none';
                return;
            }

            let exibirGrid = [];
            let exibirScroll = [];

            if (termo === "") {
                // TV modo normal (10 na tela, resto rodapé) - Celular mostra tudo
                exibirGrid = window.innerWidth <= 800 ? filtrados : filtrados.slice(0, 10);
                exibirScroll = window.innerWidth <= 800 ? [] : filtrados.slice(10);
            } else {
                exibirGrid = filtrados.slice(0, 30);
                exibirScroll = [];
            }

            let html = '';
            exibirGrid.forEach((aluno, i) => {
                let cls = 'other';
                if (aluno.posicao == 1) cls = 'gold';
                else if (aluno.posicao == 2) cls = 'silver';
                else if (aluno.posicao == 3) cls = 'bronze';

                const temFoto = aluno.foto && aluno.foto.trim();
                const inicialNome = aluno.nome.charAt(0);

                const fotoHtml = temFoto
                    ? `<img src="${aluno.foto}" class="rank-avatar" alt="${aluno.nome}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="rank-avatar-placeholder" style="display:none;">${inicialNome}</div>`
                    : `<div class="rank-avatar-placeholder">${inicialNome}</div>`;

                html += `
                <div class="rank-card ${cls}">
                    <div class="pos-num">${aluno.posicao}º</div>
                    ${fotoHtml}
                    <div class="rank-name" title="${aluno.nome}">${aluno.nome}</div>
                    <div class="rank-points">
                        <div class="pts-value">${aluno.pontos}</div>
                        <div class="pts-label">pts</div>
                    </div>
                </div>`;
            });
            board.innerHTML = html;

            if (exibirScroll.length > 0 && window.innerWidth > 800) {
                let scrollHtml = '';
                [exibirScroll, exibirScroll].forEach(lista => {
                    lista.forEach(aluno => {
                        const fotoEl = aluno.foto ? `<img src="${aluno.foto}" class="scroll-photo" alt="">` : '';
                        scrollHtml += `
                        <div class="scroll-item">
                            <span class="scroll-pos">${aluno.posicao}º</span>
                            ${fotoEl}
                            <span class="scroll-name">${aluno.nome}</span>
                            <span class="scroll-pts">${aluno.pontos} pts</span>
                        </div>
                        <span class="scroll-sep">•</span>`;
                    });
                });
                scrollContent.innerHTML = scrollHtml;
                const dur = Math.max(30, exibirScroll.length * 4);
                scrollContent.style.animationDuration = `${dur}s`;
                scrollBar.style.display = 'flex';
            } else {
                scrollBar.style.display = 'none';
            }
        }

        carregarRanking();
        setInterval(carregarRanking, 15000);

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => {}); } 
            else { document.exitFullscreen(); }
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); }); }
    </script>
</body>
</html>
