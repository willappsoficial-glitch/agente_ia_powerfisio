<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXGYM - Ranking TV Formato Pódio</title>
    <!-- Fontes imponentes -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,900;1,800;1,900&family=Barlow:wght@400;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#050505">
    <style>
        :root {
            /* Cores base */
            --bg-dark: #050505;
            --brand-orange: #ff6600;
            --brand-orange-light: #ffa133;
            --brand-white: #ffffff;
            
            /* Medalhas */
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Fundamental para TV */
            font-family: "Barlow", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* Fundo com textura esportiva */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% -20%, rgba(255, 102, 0, 0.25) 0%, transparent 70%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px),
                linear-gradient(to bottom, #0a0a0a, #000000);
            z-index: -1;
        }

        /* Layout Grid da TV */
        .tv-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ================= HEADER ================= */
        .header {
            height: 12vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4vw;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(255, 102, 0, 0.2);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.5vw;
        }

        .brand-logo {
            height: 7vh;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.5);
        }

        .brand-text h1 {
            font-family: "Barlow Condensed", sans-serif;
            font-style: italic;
            font-size: 4vh;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            color: var(--brand-white);
        }

        .brand-text p {
            font-size: 1.8vh;
            color: var(--brand-orange);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 2vw;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.8vw;
            color: var(--brand-orange-light);
            font-weight: 900;
            font-size: 2.2vh;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 1.5vh;
            height: 1.5vh;
            background-color: var(--brand-orange);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-orange);
            animation: blink 1s infinite alternate;
        }

        .clock {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 5vh;
            font-weight: 900;
            color: var(--brand-white);
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw;
            gap: 3vh;
        }

        /* Pódio Olímpico Horizontal */
        .podium-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 3vw;
            height: 42vh;
            padding-bottom: 2vh;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }

        .podium-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(20,20,20,0.9), rgba(10,10,10,0.5));
            border-top: 6px solid var(--medal-color);
            border-radius: 12px;
            padding: 2vh 2vw;
            width: 22vw;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.5s ease;
        }

        .podium-card.first {
            --medal-color: var(--gold);
            height: 100%; /* Mais alto */
            width: 26vw; /* Mais largo */
            background: linear-gradient(to top, rgba(255, 215, 0, 0.15), rgba(10,10,10,0.8));
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            z-index: 10;
        }

        .podium-card.second {
            --medal-color: var(--silver);
            height: 80%;
        }

        .podium-card.third {
            --medal-color: var(--bronze);
            height: 70%;
        }

        .podium-pos {
            position: absolute;
            top: -3.5vh;
            background: var(--medal-color);
            color: #000;
            font-family: "Barlow Condensed", sans-serif;
            font-weight: 900;
            font-size: 4vh;
            width: 7vh;
            height: 7vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .podium-card.first .podium-pos {
            top: -4.5vh;
            width: 9vh;
            height: 9vh;
            font-size: 5vh;
        }

        .podium-avatar {
            width: 12vh;
            height: 12vh;
            border-radius: 50%;
            border: 4px solid var(--medal-color);
            object-fit: cover;
            margin-bottom: 1.5vh;
            background-color: #222;
        }

        .podium-card.first .podium-avatar {
            width: 16vh;
            height: 16vh;
        }

        .podium-name {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3.5vh;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            margin-bottom: 1vh;
            color: var(--brand-white);
        }

        .podium-card.first .podium-name {
            font-size: 5vh;
            color: var(--gold);
        }

        .podium-pts {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 5vh;
            font-weight: 900;
            color: var(--brand-orange-light);
            line-height: 1;
        }

        .podium-card.first .podium-pts {
            font-size: 7vh;
        }

        .pts-label {
            font-size: 1.5vh;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid de Elite (4º ao 10º) */
        .grid-stage {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vh 4vw;
            flex: 1;
        }

        .grid-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1vh 2vw;
            gap: 1.5vw;
        }

        .grid-pos {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh;
            font-weight: 900;
            color: var(--brand-orange);
            width: 6vh;
            text-align: center;
        }

        .grid-avatar {
            width: 7vh;
            height: 7vh;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        .grid-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .grid-name {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3.5vh;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--brand-white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
        }

        .grid-pts {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3vh;
            font-weight: 900;
            color: var(--text-muted);
        }

        /* ================= TICKER ================= */
        .ticker {
            height: 8vh;
            background: var(--brand-orange);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-label {
            background: #000;
            color: var(--brand-white);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 3vw;
            font-weight: 900;
            font-size: 2.5vh;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            border-right: 4px solid var(--brand-white);
        }

        .ticker-track {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            padding-left: 100vw;
            animation: tickerMove linear infinite;
        }

        @keyframes tickerMove {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 1vw;
            margin-right: 5vw;
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3.5vh;
            font-weight: 800;
            text-transform: uppercase;
            color: #111;
        }

        .ticker-pos { font-weight: 900; color: #000; }
        .ticker-pts { color: #fff; text-shadow: 1px 1px 0px rgba(0,0,0,0.3); }

        /* ================= ESTADOS & DIGITAL SIGNAGE ================= */
        .state-panel {
            width: 100%;
            text-align: center;
            font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 4vh;
        }

        .digital-signage {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .digital-signage.show { opacity: 1; }
        #logo-patrocinador { width: 100vw; height: 100vh; object-fit: contain; }

        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 15px var(--brand-orange); }
            to { opacity: 0.4; box-shadow: 0 0 0px var(--brand-orange); }
        }
    </style>
</head>
<body>

    <!-- Ads Layer -->
    <div id="tela-patrocinadores" class="digital-signage">
        <img id="logo-patrocinador" src="" alt="Patrocinador">
    </div>

    <main class="tv-layout">
        
        <!-- Topo -->
        <header class="header">
            <div class="brand">
                <img src="logo (1).jpeg" class="brand-logo" alt="MAXGYM Logo" onclick="document.documentElement.requestFullscreen().catch(()=>{})">
                <div class="brand-text">
                    <h1>MAXGYM</h1>
                    <p>Ranking Oficial</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="live-indicator">
                    <span class="live-dot"></span> Ao Vivo
                </div>
                <div class="clock" id="clock">--:--</div>
            </div>
        </header>

        <!-- Conteúdo Principal -->
        <section class="main-content">
            
            <!-- Pódio Horizontal (Top 3) -->
            <div class="podium-stage" id="podium-area">
                <div class="state-panel">Sincronizando Atletas...</div>
            </div>

            <!-- Grid de Elite (4º ao 10º) -->
            <div class="grid-stage" id="grid-area">
                <!-- Renderizado via JS -->
            </div>

        </section>

        <!-- Rodapé Animado -->
        <footer class="ticker">
            <div class="ticker-label">Geral</div>
            <div class="ticker-track" id="ticker-content"></div>
        </footer>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        const REFRESH_MS = 15000;

        const els = {
            podium: document.getElementById("podium-area"),
            grid: document.getElementById("grid-area"),
            ticker: document.getElementById("ticker-content"),
            clock: document.getElementById("clock")
        };

        // Funções Base
        function escapeHtml(value) {
            return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function getName(aluno) {
            return escapeHtml(String(aluno?.nome ?? "Atleta").trim());
        }

        function formatPoints(value) {
            const raw = String(value ?? "0").replace(/[^\d,.-]/g, "").replace(",", ".");
            const num = Number(raw);
            return Number.isFinite(num) ? new Intl.NumberFormat("pt-BR").format(num) : "0";
        }

        function getPosition(aluno, fallback) {
            const pos = Number(aluno?.posicao);
            return Number.isFinite(pos) && pos > 0 ? pos : fallback;
        }

        function getAvatar(aluno) {
            const foto = String(aluno?.foto ?? "").trim();
            if(foto) return escapeHtml(foto);
            const initial = (Array.from(getName(aluno).trim())[0] || "A").toUpperCase();
            return `https://ui-avatars.com/api/?name=${initial}&background=ff6600&color=fff&bold=true&size=200`;
        }

        // Renderizadores
        function buildPodiumCard(aluno, pos, cssClass) {
            return `
            <div class="podium-card ${cssClass}">
                <div class="podium-pos">${pos}º</div>
                <img src="${getAvatar(aluno)}" class="podium-avatar" alt="${getName(aluno)}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'">
                <div class="podium-name">${getName(aluno)}</div>
                <div class="podium-pts">
                    ${formatPoints(aluno.pontos)}
                    <div class="pts-label">Pontos</div>
                </div>
            </div>`;
        }

        function renderPodium(topThree) {
            if (!topThree || topThree.length === 0) {
                els.podium.innerHTML = `<div class="state-panel">Nenhum atleta encontrado</div>`;
                return;
            }

            let html = "";
            // Ordem visual: Esquerda(2º), Centro(1º), Direita(3º)
            if (topThree[1]) html += buildPodiumCard(topThree[1], getPosition(topThree[1], 2), "second");
            if (topThree[0]) html += buildPodiumCard(topThree[0], getPosition(topThree[0], 1), "first");
            if (topThree[2]) html += buildPodiumCard(topThree[2], getPosition(topThree[2], 3), "third");

            els.podium.innerHTML = html;
        }

        function renderGrid(rows, offset) {
            if (!rows || rows.length === 0) {
                els.grid.innerHTML = "";
                return;
            }

            let html = "";
            rows.forEach((aluno, index) => {
                const pos = getPosition(aluno, offset + index + 1);
                html += `
                <div class="grid-card">
                    <div class="grid-pos">${pos}º</div>
                    <img src="${getAvatar(aluno)}" class="grid-avatar" alt="Avatar">
                    <div class="grid-info">
                        <div class="grid-name">${getName(aluno)}</div>
                        <div class="grid-pts">${formatPoints(aluno.pontos)} Pts</div>
                    </div>
                </div>`;
            });
            els.grid.innerHTML = html;
        }

        function renderTicker(rows, offset) {
            if (!rows || rows.length === 0) {
                els.ticker.innerHTML = "";
                return;
            }

            const html = [rows, rows].map((lista) => lista.map((aluno, index) => {
                const pos = getPosition(aluno, offset + index + 1);
                return `
                    <div class="ticker-item">
                        <span class="ticker-pos">${pos}º</span>
                        <span class="ticker-name">${getName(aluno)}</span>
                        <span class="ticker-pts">${formatPoints(aluno.pontos)} pts</span>
                    </div>`;
            }).join("")).join("");

            els.ticker.innerHTML = html;
            els.ticker.style.animationDuration = `${Math.max(20, rows.length * 3.5)}s`;
        }

        // Lógica de Atualização
        async function carregarRanking() {
            try {
                const response = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`, { cache: "no-store" });
                const payload = await response.json();
                const dadosGlobais = Array.isArray(payload) ? payload : [];
                
                if (dadosGlobais.length > 0) {
                    renderPodium(dadosGlobais.slice(0, 3));
                    renderGrid(dadosGlobais.slice(3, 10), 3);
                    renderTicker(dadosGlobais.slice(10), 10);
                }
            } catch (error) {
                console.error("Erro na API:", error);
            }
        }

        function updateClock() {
            const now = new Date();
            els.clock.textContent = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
        }

        // Sistema de Patrocínios
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function iniciarDigitalSignage() {
            const telaAds = document.getElementById('tela-patrocinadores');
            const imgLogo = document.getElementById('logo-patrocinador');

            const patrocinadores = [
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/willweb.png",
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/anuncio.png"
            ];

            while (true) {
                telaAds.classList.remove('show');
                await sleep(1000); 
                telaAds.style.display = 'none';

                await sleep(60000); // 1 min de ranking

                telaAds.style.display = 'flex';
                await sleep(50);
                telaAds.classList.add('show');

                for (let i = 0; i < patrocinadores.length; i++) {
                    if (i > 0) {
                        imgLogo.style.opacity = 0;
                        await sleep(500);
                    }
                    imgLogo.src = patrocinadores[i];
                    imgLogo.style.opacity = 1;
                    await sleep(10000); // 10 seg por banner
                }
            }
        }

        // Init
        updateClock();
        setInterval(updateClock, 1000);
        
        carregarRanking();
        setInterval(carregarRanking, REFRESH_MS);

        setTimeout(iniciarDigitalSignage, 5000);
    </script>
</body>
</html>
