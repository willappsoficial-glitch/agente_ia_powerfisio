<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXGYM - TV Ranking Ao Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#060709">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #FF5500;
            --bg-deep: #050505;
            --bg-card: rgba(18, 20, 26, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --gold: #FFD700;
            --silver: #E0E0E0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 85, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 85, 0, 0.03) 0%, transparent 50%),
                linear-gradient(135deg, #050505 0%, #121212 100%);
            color: #fff;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======= HEADER ======= */
        .header { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px 3vw 15px; flex-shrink: 0; position: relative; z-index: 10; }
        .header-logo { width: 70px; height: 70px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,85,0,0.4); cursor: pointer; border: 2px solid rgba(255,85,0,0.2); }
        .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header-title span { color: var(--primary); text-shadow: 0 0 20px rgba(255,85,0,0.5); }
        .header-subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 5px; text-transform: uppercase; margin-top: 5px; font-weight: 600; }
        
        .live-badge {
            position: absolute; right: 3vw; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 8px; background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 50px; padding: 10px 20px;
            font-size: 0.8rem; color: #00FF88; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;
        }
        .header-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: 0 5vw 20px; flex-shrink: 0; opacity: 0.4; }

        /* ======= GRID DO RANKING ======= */
        .ranking-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px 50px; 
            padding: 0 4vw 90px; 
            flex: 1; 
            overflow-y: auto;
            align-content: start;
            z-index: 10;
        }
        .ranking-grid::-webkit-scrollbar { display: none; }

        .rank-card {
            display: flex; align-items: center; gap: 15px; padding: 12px 20px 12px 15px;
            border-radius: 20px; background: var(--bg-card); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-left: 6px solid transparent; width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        @keyframes cascadeIn {
            0% { opacity: 0; transform: translateX(-30px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        .rank-card.gold { border-left-color: var(--gold); border: 1px solid rgba(255,215,0,0.3); border-left: 6px solid var(--gold); background: linear-gradient(90deg, rgba(255,215,0,0.1), rgba(18,20,26,0.8) 60%); }
        .rank-card.silver { border-left-color: var(--silver); border: 1px solid rgba(224,224,224,0.2); border-left: 6px solid var(--silver); }
        .rank-card.bronze { border-left-color: var(--bronze); border: 1px solid rgba(205,127,50,0.2); border-left: 6px solid var(--bronze); }
        
        .pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; width: 55px; text-align: center; color: rgba(255,255,255,0.1); }
        .rank-card.gold .pos-num { color: var(--gold); }
        
        .rank-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .rank-avatar-placeholder { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,85,0,0.1); border: 2px solid rgba(255,85,0,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; color: var(--primary); }
        
        .rank-name { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; text-transform: uppercase; color: #FFFFFF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .rank-points { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 8px 18px; min-width: 90px; text-align: center; }
        .pts-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; color: var(--primary); line-height: 0.9; }
        .pts-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" class="header-logo" alt="Logo" onclick="toggleFullScreen()" onerror="this.style.display='none'">
        <div>
            <div class="header-title">TOP<span>10 DO MÊS</span></div>
            <div class="header-subtitle">Pontos = Catraca + Treinos App</div>
        </div>
        <div class="live-badge"><div class="live-dot"></div>Ao Vivo</div>
    </div>

    <div class="header-divider"></div>

    <div class="ranking-grid" id="board">
        <div style="grid-column:1/-1; text-align:center; padding-top: 100px; color:var(--primary); font-size:1.8rem;">SINCRONIZANDO CÉREBRO MAX...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        const firebaseConfig = { databaseURL: "https://max-catraca-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`);
                const dados = await res.json();
                renderizar(dados);
            } catch(e) { console.error(e); }
        }

        function renderizar(dados) {
            const board = document.getElementById('board');
            let html = '';
            dados.slice(0, 10).forEach((aluno, i) => {
                let cls = i === 0 ? 'gold' : (i === 1 ? 'silver' : (i === 2 ? 'bronze' : 'other'));
                const fotoHtml = aluno.foto ? `<img src="${aluno.foto}" class="rank-avatar">` : `<div class="rank-avatar-placeholder">${aluno.nome.charAt(0)}</div>`;
                html += `
                <div class="rank-card ${cls}" style="animation: cascadeIn 0.5s ease-out ${(i * 0.08).toFixed(2)}s both;">
                    <div class="pos-num">${i + 1}º</div>
                    ${fotoHtml}
                    <div class="rank-name">${aluno.nome}</div>
                    <div class="rank-points">
                        <div class="pts-value">${aluno.pontos}</div>
                        <div class="pts-label">pts</div>
                    </div>
                </div>`;
            });
            board.innerHTML = html;
        }

        database.ref('acessos').on('child_added', () => carregarRanking());
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        window.onload = () => { carregarRanking(); setInterval(carregarRanking, 300000); };
    </script>
</body>
</html>
