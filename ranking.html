<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXGYM - Ranking TV Formato Circular</title>
    <!-- Fontes imponentes -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,900;1,800;1,900&family=Barlow:wght@400;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#050505">
    <style>
        :root {
            --bg-dark: #050505;
            --brand-orange: #ff6600;
            --brand-orange-light: #ffa133;
            --brand-white: #ffffff;
            
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Barlow", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255, 102, 0, 0.15) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(to bottom, #0a0a0a, #000000);
            z-index: -1;
        }

        .tv-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ================= HEADER ================= */
        .header {
            flex: 0 0 10vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4vw;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(255, 102, 0, 0.2);
            z-index: 20;
        }

        .brand { display: flex; align-items: center; gap: 1.5vw; }
        .brand-logo { height: 7vh; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 102, 0, 0.5); cursor: pointer; }
        .brand-text h1 {
            font-family: "Barlow Condensed", sans-serif;
            font-style: italic; font-size: 4vh; font-weight: 900; line-height: 1; text-transform: uppercase; color: var(--brand-white);
        }
        .brand-text p { font-size: 1.8vh; color: var(--brand-orange); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

        .status-bar { display: flex; align-items: center; gap: 2vw; }
        .live-indicator { display: flex; align-items: center; gap: 0.8vw; color: var(--brand-orange-light); font-weight: 900; font-size: 2.2vh; text-transform: uppercase; }
        .live-dot {
            width: 1.5vh; height: 1.5vh; background-color: var(--brand-orange); border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-orange); animation: blink 1s infinite alternate;
        }
        .clock { font-family: "Barlow Condensed", sans-serif; font-size: 5vh; font-weight: 900; color: var(--brand-white); }

        /* ================= MAIN CONTENT (ÁREA CIRCULAR) ================= */
        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        /* Anel de Fundo (Apenas Visual) */
        .circle-backdrop {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 58vh; height: 58vh;
            border-radius: 50%;
            border: 2px dashed rgba(255, 102, 0, 0.15);
            z-index: 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* ---- 1º LUGAR (CENTRO EXATO) ---- */
        .center-champion {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            text-align: center;
            animation: floatCenter 4s ease-in-out infinite;
        }

        @keyframes floatCenter {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
        }

        .center-champion .pos-badge {
            background: var(--gold); color: #000;
            font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 5vh;
            width: 8vh; height: 8vh; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--bg-dark);
            margin-bottom: -3vh; z-index: 2;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .center-champion .avatar {
            width: 18vh; height: 18vh; border-radius: 50%;
            border: 6px solid var(--gold); object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background-color: #222;
        }

        .center-champion .name {
            font-family: "Barlow Condensed", sans-serif; font-size: 4.5vh; font-weight: 900;
            text-transform: uppercase; color: var(--gold); margin-top: 1vh;
            line-height: 1; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            max-width: 30vw; text-align: center;
        }

        .center-champion .pts {
            font-family: "Barlow Condensed", sans-serif; font-size: 6vh; font-weight: 900;
            color: var(--brand-white); line-height: 1; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* ---- ORBITAIS (2º ao 10º LUGAR) ---- */
        .orbiter-card {
            position: absolute;
            top: 50%; left: 50%;
            /* A mágica da órbita: Move pro centro, rotaciona, afasta pelo raio, e desfaz a rotação para o texto não ficar de cabeça para baixo */
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(var(--radius) * -1)) rotate(calc(var(--angle) * -1));
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .orbiter-card .pos-badge {
            background: var(--orbiter-color); color: #000;
            font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 2.5vh;
            width: 4vh; height: 4vh; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--bg-dark);
            margin-bottom: -1.5vh; z-index: 2;
        }

        .orbiter-card .avatar {
            width: 7vh; height: 7vh; border-radius: 50%;
            border: 3px solid var(--orbiter-color); object-fit: cover;
            background-color: #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .orbiter-card .name {
            font-family: "Barlow Condensed", sans-serif; font-size: 2.2vh; font-weight: 800;
            text-transform: uppercase; color: var(--brand-white); margin-top: 0.5vh;
            width: 14vw; /* Limite de largura para não bater no vizinho */
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        .orbiter-card .pts {
            font-family: "Barlow Condensed", sans-serif; font-size: 2.5vh; font-weight: 900;
            color: var(--text-muted);
        }

        /* Modificadores de Destaque */
        .orbiter-card.second {
            --orbiter-color: var(--silver);
            --radius: 25vh; /* Mais próximo ao centro */
            z-index: 6;
        }
        .orbiter-card.second .avatar { width: 11vh; height: 11vh; border-width: 4px; }
        .orbiter-card.second .pos-badge { width: 5.5vh; height: 5.5vh; font-size: 3.5vh; margin-bottom: -2vh; }
        .orbiter-card.second .name { font-size: 3vh; }
        .orbiter-card.second .pts { font-size: 3.5vh; color: var(--silver); }

        .orbiter-card.third {
            --orbiter-color: var(--bronze);
            --radius: 25vh; /* Mais próximo ao centro */
            z-index: 6;
        }
        .orbiter-card.third .avatar { width: 10vh; height: 10vh; border-width: 4px; }
        .orbiter-card.third .pos-badge { width: 5vh; height: 5vh; font-size: 3vh; margin-bottom: -1.8vh; }
        .orbiter-card.third .name { font-size: 2.8vh; }
        .orbiter-card.third .pts { font-size: 3.2vh; color: var(--bronze); }

        .orbiter-card.standard {
            --orbiter-color: var(--brand-orange);
            --radius: 31vh; /* Raio da borda externa */
        }
        
        .orbiter-card.tenth {
            --orbiter-color: var(--brand-orange);
            --radius: 32vh; /* Desce o 10º lugar um pouquinho mais para centralizar perfeito na base */
        }

        /* ================= TICKER (Rodapé) ================= */
        .ticker {
            flex: 0 0 8vh;
            background: var(--brand-orange);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 20;
        }

        .ticker-label {
            background: #000; color: var(--brand-white); height: 100%;
            display: flex; align-items: center; padding: 0 3vw;
            font-weight: 900; font-size: 2.5vh; text-transform: uppercase;
            letter-spacing: 2px; z-index: 2; border-right: 4px solid var(--brand-white);
        }

        .ticker-track {
            display: inline-flex; align-items: center; white-space: nowrap;
            padding-left: 100vw; animation: tickerMove linear infinite;
        }

        @keyframes tickerMove { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        .ticker-item {
            display: inline-flex; align-items: center; gap: 1vw; margin-right: 5vw;
            font-family: "Barlow Condensed", sans-serif; font-size: 3.5vh; font-weight: 800;
            text-transform: uppercase; color: #111;
        }

        .ticker-pos { font-weight: 900; color: #000; }
        .ticker-pts { color: #fff; text-shadow: 1px 1px 0px rgba(0,0,0,0.3); }

        /* ================= ESTADOS & DIGITAL SIGNAGE ================= */
        .state-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .digital-signage {
            position: fixed; inset: 0; background-color: #000; z-index: 9999;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s ease-in-out;
        }
        .digital-signage.show { opacity: 1; }
        #logo-patrocinador { width: 100vw; height: 100vh; object-fit: contain; }

        @keyframes blink { from { opacity: 1; box-shadow: 0 0 15px var(--brand-orange); } to { opacity: 0.4; box-shadow: 0 0 0px var(--brand-orange); } }
    </style>
</head>
<body>

    <!-- Camada de Anúncios -->
    <div id="tela-patrocinadores" class="digital-signage">
        <img id="logo-patrocinador" src="" alt="Patrocinador">
    </div>

    <main class="tv-layout">
        
        <!-- Cabeçalho -->
        <header class="header">
            <div class="brand">
                <img src="logo (1).jpeg" class="brand-logo" alt="MAXGYM Logo" onclick="document.documentElement.requestFullscreen().catch(()=>{})" onerror="this.style.display='none'">
                <div class="brand-text">
                    <h1>MAXGYM</h1>
                    <p>Ranking Oficial</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="live-indicator">
                    <span class="live-dot"></span> Ao Vivo
                </div>
                <div class="clock" id="clock">--:--</div>
            </div>
        </header>

        <!-- Área Principal (Círculo) -->
        <section class="main-content" id="circle-area">
            <div class="state-panel">Sincronizando Atletas...</div>
        </section>

        <!-- Rodapé Animado (Demais Posições) -->
        <footer class="ticker">
            <div class="ticker-label">Geral</div>
            <div class="ticker-track" id="ticker-content"></div>
        </footer>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        const REFRESH_MS = 15000;

        const els = {
            circleArea: document.getElementById("circle-area"),
            ticker: document.getElementById("ticker-content"),
            clock: document.getElementById("clock")
        };

        // Utilitários de Tratamento
        function escapeHtml(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function getName(aluno) { return escapeHtml(String(aluno?.nome ?? "Atleta").trim()); }
        function formatPoints(value) {
            const num = Number(String(value ?? "0").replace(/[^\d,.-]/g, "").replace(",", "."));
            return Number.isFinite(num) ? new Intl.NumberFormat("pt-BR").format(num) : "0";
        }
        function getPosition(aluno, fallback) {
            const pos = Number(aluno?.posicao);
            return Number.isFinite(pos) && pos > 0 ? pos : fallback;
        }
        function getAvatar(aluno) {
            const foto = String(aluno?.foto ?? "").trim();
            if(foto) return escapeHtml(foto);
            return `https://ui-avatars.com/api/?name=${(Array.from(getName(aluno).trim())[0] || "A").toUpperCase()}&background=ff6600&color=fff&bold=true&size=200`;
        }

        // Construtor do Círculo
        function renderCircleLayout(dados) {
            if (!dados || dados.length === 0) {
                els.circleArea.innerHTML = `<div class="state-panel">Nenhum atleta encontrado</div>`;
                return;
            }

            let html = `<div class="circle-backdrop"></div>`; // Linha tracejada de fundo

            // 1º Lugar (Centro)
            const champion = dados[0];
            const pos1 = getPosition(champion, 1);
            html += `
            <div class="center-champion">
                <div class="pos-badge">${pos1}º</div>
                <img src="${getAvatar(champion)}" class="avatar" alt="${getName(champion)}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'">
                <div class="name">${getName(champion)}</div>
                <div class="pts">${formatPoints(champion.pontos)} Pts</div>
            </div>`;

            // Mapeamento Matemático das Posições (0 graus = Topo, 180 graus = Base)
            // [ 2º, 3º, 4º, 5º, 6º, 7º, 8º, 9º, 10º ]
            const angulos = [
                325, // 2º Lugar (Topo Esquerda)
                 35, // 3º Lugar (Topo Direita)
                285, // 4º Lugar (Esquerda Cima)
                 75, // 5º Lugar (Direita Cima)
                245, // 6º Lugar (Esquerda Baixo)
                115, // 7º Lugar (Direita Baixo)
                210, // 8º Lugar (Fundo Esquerda)
                150, // 9º Lugar (Fundo Direita)
                180  // 10º Lugar (Centro Base Exato)
            ];

            const orbiters = dados.slice(1, 10);
            
            orbiters.forEach((aluno, index) => {
                const pos = getPosition(aluno, index + 2);
                const angulo = angulos[index] !== undefined ? angulos[index] : 0;
                
                let cssClass = 'standard';
                if (pos === 2) cssClass = 'second';
                else if (pos === 3) cssClass = 'third';
                else if (pos === 10) cssClass = 'tenth';

                html += `
                <div class="orbiter-card ${cssClass}" style="--angle: ${angulo}deg;">
                    <div class="pos-badge">${pos}º</div>
                    <img src="${getAvatar(aluno)}" class="avatar" alt="Avatar" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'">
                    <div class="name">${getName(aluno)}</div>
                    <div class="pts">${formatPoints(aluno.pontos)}</div>
                </div>`;
            });

            els.circleArea.innerHTML = html;
        }

        function renderTicker(rows, offset) {
            if (!rows || rows.length === 0) {
                els.ticker.innerHTML = `<div class="ticker-item"><span class="ticker-name">CONTINUE TREINANDO PARA ENTRAR NO RANKING DE ELITE!</span></div>`;
                els.ticker.style.animationDuration = `15s`;
                return;
            }

            const html = [rows, rows].map((lista) => lista.map((aluno, index) => {
                const pos = getPosition(aluno, offset + index + 1);
                return `
                    <div class="ticker-item">
                        <span class="ticker-pos">${pos}º</span>
                        <span class="ticker-name">${getName(aluno)}</span>
                        <span class="ticker-pts">${formatPoints(aluno.pontos)} pts</span>
                    </div>`;
            }).join("")).join("");

            els.ticker.innerHTML = html;
            els.ticker.style.animationDuration = `${Math.max(20, rows.length * 3.5)}s`;
        }

        async function carregarRanking() {
            try {
                const response = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`, { cache: "no-store" });
                const payload = await response.json();
                const dadosGlobais = Array.isArray(payload) ? payload : [];
                
                if (dadosGlobais.length > 0) {
                    renderCircleLayout(dadosGlobais.slice(0, 10)); // Manda o Top 10 para o construtor do Círculo
                    renderTicker(dadosGlobais.slice(10), 10);      // Manda o 11º em diante para o rodapé
                }
            } catch (error) {
                console.error("Erro na API:", error);
            }
        }

        function updateClock() {
            const now = new Date();
            els.clock.textContent = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
        }

        // Sistema de Signage
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
        async function iniciarDigitalSignage() {
            const telaAds = document.getElementById('tela-patrocinadores');
            const imgLogo = document.getElementById('logo-patrocinador');

            const patrocinadores = [
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/willweb.png",
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/anuncio.png"
            ];

            while (true) {
                telaAds.classList.remove('show');
                await sleep(1000); 
                telaAds.style.display = 'none';

                await sleep(60000); 

                telaAds.style.display = 'flex';
                await sleep(50);
                telaAds.classList.add('show');

                for (let i = 0; i < patrocinadores.length; i++) {
                    if (i > 0) {
                        imgLogo.style.opacity = 0;
                        await sleep(500);
                    }
                    imgLogo.src = patrocinadores[i];
                    imgLogo.style.opacity = 1;
                    await sleep(10000); 
                }
            }
        }

        // Init
        updateClock();
        setInterval(updateClock, 1000);
        carregarRanking();
        setInterval(carregarRanking, REFRESH_MS);
        setTimeout(iniciarDigitalSignage, 5000);
    </script>
</body>
</html>
