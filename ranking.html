<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerfisio - TV Ranking Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#08090C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --primary: #FF5500;
            --primary-glow: rgba(255, 85, 0, 0.4);
            --bg-dark: #08090C;
            --bg-card: rgba(26, 29, 36, 0.6);
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Fundo com gradiente radial para profundidade */
            background: radial-gradient(circle at 50% -20%, rgba(255,85,0,0.15) 0%, var(--bg-dark) 70%);
            background-color: var(--bg-dark);
            color: #FFF;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            padding: 2vh 2vw; 
        }

        /* --- CABEÇALHO --- */
        .header {
            text-align: center;
            padding: 10px 20px; 
            margin-bottom: 10px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .header img {
            max-width: 120px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(255, 85, 0, 0.2);
            cursor: pointer;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h1 { 
            font-size: 2.4rem; 
            font-weight: 900; 
            letter-spacing: -1px; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        } 
        .header h1 span { color: var(--primary); }
        .header p { 
            font-size: 0.9rem; 
            color: #A0A5B5; 
            text-transform: uppercase; 
            font-weight: 800; 
            letter-spacing: 6px; 
            margin-top: 5px; 
        }

        /* --- GRID DOS CARDS --- */
        .container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
            grid-template-rows: repeat(5, 1fr); 
            grid-auto-flow: column; 
            gap: 12px 40px; 
            width: 96%; 
            max-width: 1800px; 
            margin: 0 auto 80px auto; 
            flex: 1;
            min-height: 0; 
        }

        /* --- ESTILO DOS CARDS (GLASSMORPHISM) --- */
        .rank-row {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 15px; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 0.5s ease;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            height: 100%;
        }

        /* ANIMAÇÃO DE ENTRADA */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- DESTAQUES TOP 3 (NEON GLOW) --- */
        .rank-row:nth-child(1) { 
            animation-delay: 0.1s; 
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.15) 0%, var(--bg-card) 60%);
            border-left: 6px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15), 0 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        .rank-row:nth-child(2) { 
            animation-delay: 0.2s; 
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.1) 0%, var(--bg-card) 60%);
            border-left: 6px solid var(--silver);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.1), 0 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(192, 192, 192, 0.3);
            border-bottom: 1px solid rgba(192, 192, 192, 0.3);
        }
        .rank-row:nth-child(3) { 
            animation-delay: 0.3s; 
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, var(--bg-card) 60%);
            border-left: 6px solid var(--bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.1), 0 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(205, 127, 50, 0.3);
            border-bottom: 1px solid rgba(205, 127, 50, 0.3);
        }
        .rank-row:nth-child(n+4) {
            border-left: 6px solid rgba(255, 255, 255, 0.1);
        }

        /* --- POSIÇÃO & FOTO --- */
        .pos { font-size: 2.2rem; font-weight: 900; width: 65px; color: #4A5060; text-align: center; }
        .rank-row:nth-child(1) .pos { color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .rank-row:nth-child(2) .pos { color: var(--silver); text-shadow: 0 0 15px rgba(192,192,192,0.5); }
        .rank-row:nth-child(3) .pos { color: var(--bronze); text-shadow: 0 0 15px rgba(205,127,50,0.5); }

        .foto-ranking { 
            width: 55px; height: 55px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-right: 15px; 
            border: 3px solid #2A2F3A;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .rank-row:nth-child(1) .foto-ranking { border-color: var(--gold); }
        .rank-row:nth-child(2) .foto-ranking { border-color: var(--silver); }
        .rank-row:nth-child(3) .foto-ranking { border-color: var(--bronze); }

        /* --- NOME --- */
        .nome { 
            font-size: 1.3rem; 
            font-weight: 800; 
            flex: 1; 
            text-align: left; 
            padding-right: 15px; 
            white-space: normal; 
            line-height: 1.2; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden;
            text-transform: uppercase;
            color: #E2E8F0;
        }

        /* --- BADGE DE PONTOS --- */
        .badge-pontos { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            background: rgba(255, 85, 0, 0.1);
            border: 1px solid rgba(255, 85, 0, 0.2);
            padding: 8px 15px;
            border-radius: 14px;
            min-width: 90px;
            box-shadow: inset 0 0 10px rgba(255,85,0,0.05);
        }
        .pontos { font-size: 2.2rem; font-weight: 900; color: var(--primary); line-height: 1; text-shadow: 0 0 10px rgba(255,85,0,0.3);}
        .label { font-size: 0.7rem; color: #FFAA88; text-transform: uppercase; font-weight: 800; margin-top: 2px; letter-spacing: 1px;}
        
        /* --- STATUS EM TEMPO REAL --- */
        .max-badge { 
            position: fixed; 
            bottom: 80px; 
            right: 3vw; 
            font-size: 0.85rem; 
            color: #8B92A5; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px);
            padding: 6px 16px; 
            border-radius: 30px; 
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .max-badge span { 
            display: inline-block; width: 10px; height: 10px; background: #00FF88; border-radius: 50%; 
            box-shadow: 0 0 10px #00FF88; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; box-shadow: 0 0 15px #00FF88; } 100% { opacity: 0.4; } }

        /* ==========================================
            🌟 BARRA DE ROLAGEM (MARQUEE)
            ========================================== */
        #scrolling-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 60px;
            background: rgba(11, 12, 16, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 85, 0, 0.3);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }

        #scrolling-content {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            padding-left: 100vw; 
            animation: scrollLeft linear infinite;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .scroll-item {
            display: inline-flex;
            align-items: center;
            margin-right: 150px; 
            color: #FFF;
        }

        .scroll-item .pos { font-size: 1.5rem; font-weight: 900; color: #6A7285; width: auto; margin-right: 15px; }
        .scroll-item .foto-scroll { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #4A5060; margin-right: 15px; }
        
        /* 🔥 Correção aplicada aqui: Impede que o nome quebre em duas linhas */
        .scroll-item .nome { 
            font-size: 1.3rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: inline-block; 
            color: #A0A5B5;
            white-space: nowrap; 
            flex: none; 
        }

        /* ==========================================
            🌟 RESPONSIVIDADE
            ========================================== */
        @media (max-width: 1024px) {
            .header h1 { font-size: 2.2rem; }
            .pos { font-size: 1.8rem; width: 50px; }
            .nome { font-size: 1.1rem; }
            .pontos { font-size: 1.8rem; }
            .badge-pontos { min-width: 75px; padding: 5px 10px; }
            .container { gap: 10px 20px; margin-bottom: 70px;}
        }

    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" alt="Logo Powerfisio" onclick="toggleFullScreen()">
        <h1>POWER<span>FISIO</span></h1>
        <p>Ranking de Frequência - Top 10 do Mês</p>
    </div>

    <div class="container" id="board">
        <h2 style="color: var(--primary); margin-top: 20vh; grid-column: span 2; text-align: center;">A carregar dados do Cérebro Max...</h2>
    </div>

    <div class="max-badge">
        <span></span> ATUALIZAÇÃO EM TEMPO REAL
    </div>

    <div id="scrolling-wrapper" style="display: none;">
        <div id="scrolling-content">
            </div>
    </div>

    <script>
        // 🚨 MANTENHA A SUA URL AQUI
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";

        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV`);
                const dados = await res.json();

                const board = document.getElementById('board');
                const scrollWrapper = document.getElementById('scrolling-wrapper');
                const scrollContent = document.getElementById('scrolling-content');
                
                if(dados.length === 0) {
                    board.innerHTML = `<h2 style="color: #8B92A5; margin-top: 20vh; grid-column: span 2; text-align: center; width: 100%;">Nenhum ponto acumulado este mês ainda.</h2>`;
                    scrollWrapper.style.display = 'none';
                    return;
                }

                const top10 = dados.slice(0, 10);
                const restantes = dados.slice(10);

                // 1. MONTA O QUADRO TOP 10
                let htmlTop = '';
                top10.forEach(aluno => {
                    let fotoHtml = '';
                    if (aluno.foto && aluno.foto.trim() !== "") {
                        fotoHtml = `<img src="${aluno.foto}" class="foto-ranking" alt="${aluno.nome}">`;
                    }

                    htmlTop += `
                    <div class="rank-row">
                        <div class="pos">${aluno.posicao}º</div>
                        ${fotoHtml}
                        <div class="nome">${aluno.nome}</div>
                        <div class="badge-pontos">
                            <span class="pontos">${aluno.pontos}</span>
                            <span class="label">Pontos</span>
                        </div>
                    </div>`;
                });
                board.innerHTML = htmlTop;

                // 2. MONTA A BARRA DE ROLAGEM
                if (restantes.length > 0) {
                    let htmlScroll = '';
                    restantes.forEach(aluno => {
                        let fotoHtml = '';
                        if (aluno.foto && aluno.foto.trim() !== "") {
                            fotoHtml = `<img src="${aluno.foto}" class="foto-scroll" alt="${aluno.nome}">`;
                        }

                        htmlScroll += `
                        <div class="scroll-item">
                            <div class="pos">${aluno.posicao}º</div>
                            ${fotoHtml}
                            <div class="nome">${aluno.nome}</div>
                        </div>`;
                    });

                    scrollContent.innerHTML = htmlScroll;
                    
                    let tempoAnimacao = Math.max(30, restantes.length * 3.5);
                    scrollContent.style.animationDuration = `${tempoAnimacao}s`;
                    
                    scrollWrapper.style.display = 'flex';
                } else {
                    scrollWrapper.style.display = 'none';
                }

            } catch(e) {
                console.error("Erro ao puxar o ranking", e);
            }
        }

        carregarRanking();
        setInterval(carregarRanking, 15000);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(()=>{});
            });
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao tentar tela cheia: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
