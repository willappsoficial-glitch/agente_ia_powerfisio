<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAXGYM TV PREMIUM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Barlow',sans-serif;
}

html,
body{

width:100%;
height:100%;
overflow:hidden;
background:#060606;
color:#FFF;

}

/* ===========================================================
FUNDO PREMIUM
=========================================================== */

body{

background:

radial-gradient(circle at top,#ff6a0018 0%,transparent 40%),

radial-gradient(circle at bottom,#ff6a0012 0%,transparent 45%),

linear-gradient(180deg,#090909,#111111,#050505);

position:relative;

}

/* textura */

body:before{

content:"";

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

background-image:

linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),

linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);

background-size:45px 45px;

opacity:.35;

animation:gridMove 30s linear infinite;

}

/* brilho */

body:after{

content:"";

position:absolute;

left:-20%;

top:-20%;

width:140%;

height:140%;

background:

radial-gradient(circle,#ff660030 0%,transparent 55%);

filter:blur(90px);

animation:glow 10s ease infinite;

}

@keyframes glow{

0%{

transform:scale(1);

}

50%{

transform:scale(1.15);

}

100%{

transform:scale(1);

}

}

@keyframes gridMove{

0%{

transform:translateY(0);

}

100%{

transform:translateY(45px);

}

}

/* ===========================================================
LOGO GIGANTE
=========================================================== */

.watermark{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

font-size:220px;

font-weight:900;

color:#ffffff05;

letter-spacing:15px;

user-select:none;

pointer-events:none;

z-index:0;

}

/* ===========================================================
PARTÍCULAS
=========================================================== */

.particles{

position:absolute;

width:100%;

height:100%;

overflow:hidden;

z-index:0;

}

.particles span{

position:absolute;

display:block;

width:6px;

height:6px;

border-radius:50%;

background:#ff6600;

box-shadow:

0 0 20px #ff6600,

0 0 40px #ff6600;

animation:particle linear infinite;

opacity:.45;

}

@keyframes particle{

0%{

transform:translateY(120vh);

opacity:0;

}

20%{

opacity:1;

}

80%{

opacity:1;

}

100%{

transform:translateY(-20vh);

opacity:0;

}

}

/* ===========================================================
HEADER
=========================================================== */

.header{

position:relative;

z-index:5;

display:flex;

justify-content:space-between;

align-items:center;

padding:35px 50px;

}

.logoArea{

display:flex;

align-items:center;

gap:25px;

}

.logo{

width:90px;

height:90px;

border-radius:28px;

background:#161616;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

box-shadow:

0 0 40px #ff660055,

0 15px 50px rgba(0,0,0,.5);

}

.logo img{

width:100%;

}

.title{

display:flex;

flex-direction:column;

}

.title h1{

font-size:58px;

font-weight:900;

letter-spacing:2px;

}

.title h1 span{

color:#ff6600;

text-shadow:

0 0 25px #ff6600;

}

.subtitle{

font-size:18px;

opacity:.7;

letter-spacing:4px;

margin-top:6px;

}

/* ===========================================================
BADGE AO VIVO
=========================================================== */

.live{

padding:16px 30px;

border-radius:60px;

background:#0d0d0d;

border:1px solid #2aff90;

display:flex;

align-items:center;

gap:14px;

box-shadow:

0 0 30px rgba(42,255,144,.15);

}

.liveDot{

width:12px;

height:12px;

border-radius:50%;

background:#2aff90;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{

transform:scale(.8);

opacity:.4;

}

50%{

transform:scale(1.3);

opacity:1;

}

100%{

transform:scale(.8);

opacity:.4;

}

}

/* ===========================================================
BUSCA
=========================================================== */

.search{

position:relative;

z-index:5;

margin:10px 50px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:18px;

padding:18px 28px;

}

.search input{

width:100%;

background:none;

border:none;

outline:none;

font-size:22px;

color:white;

}

/* ===========================================================
GRID
=========================================================== */

.ranking{

position:relative;

z-index:5;

display:grid;

grid-template-columns:1fr 1fr;

gap:22px;

padding:20px 50px 90px;

height:calc(100vh - 240px);

}

/* ===========================================================
CARD PREMIUM
=========================================================== */

.card{

display:flex;

align-items:center;

gap:22px;

padding:18px;

border-radius:24px;

background:

linear-gradient(180deg,

rgba(255,255,255,.08),

rgba(255,255,255,.03));

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 18px 40px rgba(0,0,0,.45);

transition:.35s;

overflow:hidden;

position:relative;

}

.card:before{

content:"";

position:absolute;

left:-60%;

top:0;

width:40%;

height:100%;

background:

linear-gradient(90deg,

transparent,

rgba(255,255,255,.18),

transparent);

transform:skewX(-25deg);

animation:shine 7s infinite;

}

@keyframes shine{

0%{

left:-60%;

}

100%{

left:160%;

}

}

.card:hover{

transform:translateY(-4px);

box-shadow:

0 20px 55px rgba(255,102,0,.25);

}
/* ===========================================================
PÓDIO
===========================================================*/

.card.gold{

background:
linear-gradient(135deg,
rgba(255,190,0,.22),
rgba(255,120,0,.12),
rgba(30,30,30,.95));

border:2px solid #FFD700;

box-shadow:
0 0 20px rgba(255,215,0,.30),
0 0 60px rgba(255,180,0,.15),
0 20px 60px rgba(0,0,0,.45);

transform:scale(1.03);

}

.card.gold::after{

content:"👑";

position:absolute;

top:-10px;

right:18px;

font-size:34px;

animation:crownFloat 2.5s ease-in-out infinite;

}

@keyframes crownFloat{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

}

.card.silver{

background:
linear-gradient(135deg,
rgba(220,220,220,.18),
rgba(70,70,70,.10));

border:2px solid #D8D8D8;

box-shadow:
0 0 20px rgba(255,255,255,.12);

}

.card.bronze{

background:
linear-gradient(135deg,
rgba(205,127,50,.22),
rgba(60,35,10,.10));

border:2px solid #CD7F32;

box-shadow:
0 0 20px rgba(205,127,50,.18);

}

/* ===========================================================
POSIÇÃO
===========================================================*/

.position{

width:90px;

font-size:62px;

font-weight:900;

text-align:center;

color:#888;

}

.gold .position{

color:#FFD700;

text-shadow:
0 0 25px #FFD700;

}

.silver .position{

color:#EAEAEA;

}

.bronze .position{

color:#CD7F32;

}

/* ===========================================================
FOTO
===========================================================*/

.photo{

width:82px;

height:82px;

border-radius:50%;

overflow:hidden;

flex-shrink:0;

border:4px solid rgba(255,255,255,.15);

box-shadow:

0 10px 30px rgba(0,0,0,.45);

}

.gold .photo{

border-color:#FFD700;

box-shadow:

0 0 35px rgba(255,215,0,.45);

}

.photo img{

width:100%;

height:100%;

object-fit:cover;

}

/* ===========================================================
NOME
===========================================================*/

.info{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

min-width:0;

}

.name{

font-size:34px;

font-weight:800;

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

letter-spacing:1px;

}

.status{

margin-top:8px;

font-size:14px;

letter-spacing:3px;

text-transform:uppercase;

opacity:.55;

}

/* ===========================================================
PONTOS
===========================================================*/

.points{

min-width:150px;

border-radius:18px;

padding:14px;

text-align:center;

background:

linear-gradient(180deg,

#ff7b00,

#ff4d00);

box-shadow:

0 0 35px rgba(255,102,0,.45);

}

.points .number{

font-size:52px;

font-weight:900;

line-height:1;

}

.points .label{

margin-top:4px;

font-size:15px;

letter-spacing:3px;

font-weight:700;

}

/* campeão */

.gold .points{

background:

linear-gradient(180deg,

#FFD700,

#ff9900);

color:#111;

box-shadow:

0 0 50px rgba(255,215,0,.55);

}

/* ===========================================================
EFEITO RESPIRAÇÃO
===========================================================*/

.gold{

animation:goldPulse 2.5s infinite;

}

@keyframes goldPulse{

0%{

transform:scale(1.03);

}

50%{

transform:scale(1.045);

}

100%{

transform:scale(1.03);

}

}

/* ===========================================================
ENTRADA DOS CARDS
===========================================================*/

.card{

opacity:0;

transform:translateY(30px);

animation:cardIn .7s forwards;

}

@keyframes cardIn{

to{

opacity:1;

transform:translateY(0);

}

}

/* ===========================================================
RODAPÉ ESPN
===========================================================*/

.ticker{

position:fixed;

left:0;

bottom:0;

width:100%;

height:68px;

display:flex;

align-items:center;

background:

linear-gradient(90deg,

#111,

#1d1d1d,

#111);

border-top:2px solid #ff6600;

overflow:hidden;

z-index:999;

box-shadow:

0 -10px 30px rgba(0,0,0,.45);

}

.ticker-title{

background:#ff6600;

height:100%;

padding:0 35px;

display:flex;

align-items:center;

font-size:22px;

font-weight:900;

letter-spacing:2px;

color:white;

flex-shrink:0;

}

.ticker-content{

white-space:nowrap;

display:inline-flex;

padding-left:100%;

animation:tickerMove 45s linear infinite;

}

.ticker-item{

font-size:22px;

font-weight:700;

margin-right:90px;

opacity:.9;

}

.ticker-item span{

color:#ff7b00;

font-weight:900;

margin-left:12px;

}

@keyframes tickerMove{

0%{

transform:translateX(0);

}

100%{

transform:translateX(-100%);

}

}

/* ===========================================================
RESPONSIVO
===========================================================*/

@media(max-width:900px){

.ranking{

grid-template-columns:1fr;

overflow:auto;

padding-bottom:120px;

}

.header{

flex-direction:column;

gap:20px;

}

.title h1{

font-size:40px;

}

.search{

margin:20px;

}

.position{

font-size:44px;

width:60px;

}

.photo{

width:65px;

height:65px;

}

.name{

font-size:24px;

}

.points{

min-width:110px;

}

.points .number{

font-size:36px;

}

.watermark{

font-size:120px;

}

}

</style>

</head>

<body>

<div class="watermark">
    MAXGYM
</div>

<div class="particles" id="particles"></div>

<!-- =========================
HEADER
========================= -->

<header class="header">

    <div class="logoArea">

        <div class="logo">
            <img src="logo.jpeg" alt="Logo">
        </div>

        <div class="title">

            <h1>
                TOP <span>10 DO MÊS</span>
            </h1>

            <div class="subtitle">
                RANKING OFICIAL MAXGYM
            </div>

        </div>

    </div>

    <div class="live">

        <div class="liveDot"></div>

        <strong>AO VIVO</strong>

    </div>

</header>

<!-- =========================
PESQUISA
========================= -->

<div class="search">

    <input

        id="input-pesquisa"

        type="text"

        placeholder="Pesquisar aluno..."

        onkeyup="filtrarRanking()"

    >

</div>

<!-- =========================
RANKING
========================= -->

<section

class="ranking"

id="board"

>

<div

style="

grid-column:1/-1;

display:flex;

align-items:center;

justify-content:center;

height:100%;

font-size:34px;

font-weight:700;

opacity:.5;

"

>

Carregando Ranking...

</div>

</section>

<!-- =========================
BARRA ESPN
========================= -->

<div class="ticker">

    <div class="ticker-title">

        🔥 CLASSIFICAÇÃO

    </div>

    <div

    class="ticker-content"

    id="ticker"

    >

    </div>

</div>

<!-- =========================
TELA DE PATROCINADORES
========================= -->

<div

id="tela-patrocinadores"

class="digital-signage"

>

<img

id="logo-patrocinador"

src=""

alt="Patrocinador"

>

</div>

<!-- =========================
FIREBASE
========================= -->

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

<script>

const API_URL="COLOQUE_AQUI_SUA_API";

const firebaseConfig={

databaseURL:

"https://max-catraca-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const database=firebase.database();

let dadosGlobais=[];

/*=========================
PARTÍCULAS
=========================*/

const container=document.getElementById("particles");

for(let i=0;i<90;i++){

const p=document.createElement("span");

p.style.left=Math.random()*100+"%";

p.style.animationDuration=

(8+Math.random()*10)+"s";

p.style.animationDelay=

Math.random()*8+"s";

p.style.opacity=

Math.random();

p.style.transform=

"scale("+(0.5+Math.random())+")";

container.appendChild(p);

}

/*=========================
FULL SCREEN
=========================*/

document.querySelector(".logo")

.onclick=function(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

};
/*=========================================================
CARREGAR RANKING
=========================================================*/

async function carregarRanking(){

try{

    const resposta = await fetch(
        API_URL + "?acao=getRankingTV&t=" + Date.now()
    );

    dadosGlobais = await resposta.json();

    filtrarRanking();

}catch(e){

    console.error(e);

}

}

/*=========================================================
FILTRO
=========================================================*/

function filtrarRanking(){

const texto = document
    .getElementById("input-pesquisa")
    .value
    .toLowerCase();

let lista = dadosGlobais;

if(texto!=""){

    lista = lista.filter(a=>
        a.nome.toLowerCase().includes(texto)
    );

}

montarRanking(lista);

}

/*=========================================================
MONTAR RANKING
=========================================================*/

function montarRanking(lista){

const board=document.getElementById("board");

const ticker=document.getElementById("ticker");

board.innerHTML="";

ticker.innerHTML="";

if(lista.length==0){

    board.innerHTML=`

    <div
    style="
    grid-column:1/-1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    opacity:.5;
    ">

    Nenhum atleta encontrado

    </div>

    `;

    return;

}

lista.forEach((aluno,index)=>{

    let classe="";

    if(aluno.posicao==1)
        classe="gold";

    else if(aluno.posicao==2)
        classe="silver";

    else if(aluno.posicao==3)
        classe="bronze";

    const foto = aluno.foto && aluno.foto!=""
        ? aluno.foto
        : "https://ui-avatars.com/api/?name="+encodeURIComponent(aluno.nome);

    board.innerHTML+=`

<div

class="card ${classe}"

style="animation-delay:${index*.08}s"

>

<div class="position">

${aluno.posicao}º

</div>

<div class="photo">

<img src="${foto}">

</div>

<div class="info">

<div class="name">

${aluno.nome}

</div>

<div class="status">

ATLETA MAXGYM

</div>

</div>

<div class="points">

<div class="number">

${aluno.pontos}

</div>

<div class="label">

PONTOS

</div>

</div>

</div>

`;

});

/*====================================
BARRA ESPN
====================================*/

lista.forEach(aluno=>{

    ticker.innerHTML+=`

<div class="ticker-item">

${aluno.posicao}º

<strong>

${aluno.nome}

</strong>

<span>

${aluno.pontos} pts

</span>

</div>

`;

});

}

/*=========================================================
ANIMAÇÃO DOS PONTOS
=========================================================*/

function animarPontos(){

document

.querySelectorAll(".number")

.forEach(numero=>{

    numero.animate([

        {

            transform:"scale(1.35)",

            opacity:.5

        },

        {

            transform:"scale(1)",

            opacity:1

        }

    ],{

        duration:600

    });

});

}

/*=========================================================
BRILHO CAMPEÃO
=========================================================*/

setInterval(()=>{

const campeao=document.querySelector(".gold");

if(campeao){

    campeao.animate([

        {

            boxShadow:

            "0 0 10px #FFD700"

        },

        {

            boxShadow:

            "0 0 80px #FFD700"

        },

        {

            boxShadow:

            "0 0 10px #FFD700"

        }

    ],{

        duration:2500

    });

}

},3000);

/*=========================================================
ATUALIZAÇÃO AUTOMÁTICA
=========================================================*/

setInterval(()=>{

carregarRanking();

animarPontos();

},60000);

/*=========================================================
ATUALIZAÇÃO EM TEMPO REAL (FIREBASE)
=========================================================*/

database.ref("acessos").on("child_added",(snapshot)=>{

const chave=snapshot.key;

carregarRanking();

animarPontos();

setTimeout(()=>{

    database
    .ref("acessos/"+chave)
    .remove();

},15000);

});

/*=========================================================
DIGITAL SIGNAGE
=========================================================*/

const patrocinadores=[

"https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/anuncio.png",

"https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/willweb.png"

];

const telaAds=document.getElementById("tela-patrocinadores");

const logoAds=document.getElementById("logo-patrocinador");

function sleep(ms){

return new Promise(r=>setTimeout(r,ms));

}

async function iniciarPublicidade(){

while(true){

    /* ranking por 60 segundos */

    telaAds.style.display="none";

    await sleep(60000);

    /* patrocinadores */

    telaAds.style.display="flex";

    telaAds.style.opacity="1";

    for(let i=0;i<patrocinadores.length;i++){

        logoAds.style.opacity="0";

        await sleep(500);

        logoAds.src=patrocinadores[i];

        logoAds.style.opacity="1";

        await sleep(10000);

    }

    telaAds.style.opacity="0";

    await sleep(1000);

}

}

/*=========================================================
RELÓGIO
=========================================================*/

function atualizarRelogio(){

const agora=new Date();

const hora=

agora.toLocaleTimeString("pt-BR",{

    hour:"2-digit",

    minute:"2-digit"

});

const subtitulo=document.querySelector(".subtitle");

subtitulo.innerHTML=

"RANKING OFICIAL MAXGYM • "+hora;

}

setInterval(atualizarRelogio,1000);

/*=========================================================
EFEITO DE BRILHO ALEATÓRIO
=========================================================*/

setInterval(()=>{

document.querySelectorAll(".card").forEach(card=>{

    card.style.transition=".5s";

    card.style.filter="brightness(1)";

});

const cards=document.querySelectorAll(".card");

if(cards.length){

    const indice=Math.floor(Math.random()*cards.length);

    cards[indice].style.filter="brightness(1.25)";

}

},3000);

/*=========================================================
ATALHOS
=========================================================*/

document.addEventListener("keydown",(e)=>{

if(e.key==="f"){

    if(!document.fullscreenElement){

        document.documentElement.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}

if(e.key==="r"){

    carregarRanking();

}

});

/*=========================================================
INICIALIZAÇÃO
=========================================================*/

window.onload=()=>{

atualizarRelogio();

carregarRanking();

iniciarPublicidade();

};

/*=========================================================
FIM
=========================================================*/

</script>

</body>

</html>
