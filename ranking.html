<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerfisio - TV Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root {
            --primary: #FF5500;
            --bg-dark: #0B0C10;
            --bg-card: #1A1D24;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: #FFF;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            padding: 2vh 2vw; /* 🌟 AJUSTE: Reduzimos a margem para caber mais coisa */
        }

        .header {
            text-align: center;
            padding: 10px; /* 🌟 AJUSTE: Cabeçalho mais fino */
            background: linear-gradient(180deg, rgba(255,85,0,0.1) 0%, rgba(11,12,16,1) 100%);
            border-bottom: 2px solid rgba(255, 85, 0, 0.2);
            border-radius: 16px; 
            flex-shrink: 0;
        }
        .header h1 { font-size: 2.6rem; font-weight: 900; letter-spacing: -2px; } /* 🌟 AJUSTE: Letra menor */
        .header h1 span { color: var(--primary); }
        .header p { font-size: 1rem; color: #8B92A5; text-transform: uppercase; font-weight: 700; letter-spacing: 5px; margin-top: 5px; }

        .container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
            grid-template-rows: repeat(5, 1fr); 
            grid-auto-flow: column; 
            gap: 8px 30px; /* 🌟 AJUSTE: Menos espaço entre as caixas */
            width: 96%; 
            max-width: 1800px; 
            margin: 15px auto 30px auto; /* 🌟 AJUSTE: Empurra menos para baixo */
            flex: 1;
            min-height: 0; 
        }
        .rank-row {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            padding: 4px 12px; /* 🌟 AJUSTE: Caixas ligeiramente mais finas */
            border-radius: 16px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border-left: 6px solid #2A2F3A;
            transition: transform 0.5s ease;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            height: 100%;
        }
        .rank-row:nth-child(1) { animation-delay: 0.1s; border-color: var(--gold); background: linear-gradient(90deg, rgba(255, 215, 0, 0.1) 0%, var(--bg-card) 50%); transform: scale(1.02); z-index: 10;}
        .rank-row:nth-child(2) { animation-delay: 0.2s; border-color: var(--silver); background: linear-gradient(90deg, rgba(192, 192, 192, 0.1) 0%, var(--bg-card) 50%); transform: scale(1.01); z-index: 9;}
        .rank-row:nth-child(3) { animation-delay: 0.3s; border-color: var(--bronze); background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, var(--bg-card) 50%); transform: scale(1.00); z-index: 8;}
        
        @keyframes fadeIn { to { opacity: 1; } }

        .pos { font-size: 2rem; font-weight: 900; width: 60px; color: #555; }
        .rank-row:nth-child(1) .pos { color: var(--gold); }
        .rank-row:nth-child(2) .pos { color: var(--silver); }
        .rank-row:nth-child(3) .pos { color: var(--bronze); }

        .nome { 
            font-size: 1.5rem; /* 🌟 AJUSTE: Nome um pouco menor para caber em TVs HD */
            font-weight: 800; 
            flex: 1; 
            text-align: left; 
            padding-right: 10px;
            white-space: normal; 
            line-height: 1.1; 
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .pontos-container { display: flex; align-items: center; gap: 10px; }
        .pontos { font-size: 2.4rem; font-weight: 900; color: var(--primary); }
        .label { font-size: 0.9rem; color: #8B92A5; text-transform: uppercase; font-weight: 700; margin-top: 5px;}
        .max-badge { 
            position: fixed; 
            bottom: 10px; /* 🌟 AJUSTE: Colado mais ao fundo */
            right: 3vw; 
            font-size: 0.9rem; 
            color: #666; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            background-color: var(--bg-dark); 
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 100;
        }
        .max-badge span { display: inline-block; width: 12px; height: 12px; background: #00FF88; border-radius: 50%; box-shadow: 0 0 10px #00FF88; animation: pulse 2s infinite;}

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; box-shadow: 0 0 20px #00FF88; } 100% { opacity: 0.5; } }

        /* ==========================================
           🌟 MÓDULO RESPONSIVO (Tablets e Celulares)
           ========================================== */
        
        /* Telas médias (Tablets e iPads) */
        @media (max-width: 1024px) {
            .header h1 { font-size: 2.5rem; }
            .header p { font-size: 1rem; }
            .pos { font-size: 2rem; width: 60px; }
            .nome { font-size: 1.4rem; }
            .pontos { font-size: 2.2rem; }
            .container { gap: 10px 20px; }
        }

        /* Telas pequenas (Celulares) */
        @media (max-width: 800px) {
            body {
                overflow-y: auto; /* Desbloqueia a rolagem no celular */
                height: auto;
                min-height: 100vh;
                padding: 2vh 4vw;
            }
            .header img { max-width: 100px !important; }
            .header h1 { font-size: 2rem; }
            .header p { font-size: 0.8rem; letter-spacing: 2px; }
            
            .container {
                display: flex; /* Muda de Grid para Flexbox no celular */
                flex-direction: column;
                gap: 10px;
                width: 100%;
                margin: 20px auto 70px auto; /* Margem inferior para o selo não cobrir os dados */
            }
            
            .rank-row {
                height: 80px; /* Altura fixa para ficar bonito na rolagem */
                padding: 10px 15px;
            }

            .pos { font-size: 1.8rem; width: 50px; }
            .nome { font-size: 1.2rem; -webkit-line-clamp: 2; }
            .pontos { font-size: 2rem; }
            .label { font-size: 0.8rem; }

            .max-badge {
                bottom: 10px;
                right: 50%;
                transform: translateX(50%); /* Centraliza perfeitamente no rodapé */
                width: 90%;
                justify-content: center;
                box-shadow: 0 -5px 15px rgba(0,0,0,0.5); /* Sombra para destacar do fundo */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpeg" alt="Logo Powerfisio" onclick="toggleFullScreen()" style="max-width: 150px; margin-bottom: 5px; border-radius: 12px; box-shadow: 0 5px 15px rgba(255, 85, 0, 0.2); cursor: pointer;">
        <h1>POWER<span>FISIO</span></h1>
        <p>RANKING DE FREQUÊNCIA E PONTOS - TOP 10 DO MÊS</p>
    </div>

    <div class="container" id="board">
        <h2 style="color: var(--primary); margin-top: 20vh; grid-column: span 2; text-align: center;">A carregar dados do Cérebro Max...</h2>
    </div>

    <div class="max-badge">
        <span></span> ATUALIZAÇÃO EM TEMPO REAL
    </div>

    <script>
        // 🚨 MANTENHA A SUA URL AQUI
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";

        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV`);
                const dados = await res.json();

                const board = document.getElementById('board');
                
                if(dados.length === 0) {
                    // 🌟 ATUALIZADO: "Ponto acumulado"
                    board.innerHTML = `<h2 style="color: #8B92A5; margin-top: 20vh; grid-column: span 2; text-align: center; width: 100%;">Nenhum ponto acumulado este mês ainda.</h2>`;
                    return;
                }

                let html = '';
                dados.forEach(aluno => {
                    html += `
                    <div class="rank-row">
                        <div class="pos">${aluno.posicao}º</div>
                        <div class="nome">${aluno.nome}</div>
                        <div class="pontos-container">
                            <div class="pontos">${aluno.pontos}</div>
                            <div class="label">Pontos</div>
                        </div>
                    </div>`;
                });

                board.innerHTML = html;

            } catch(e) {
                console.error("Erro ao puxar o ranking", e);
            }
        }

        carregarRanking();
        setInterval(carregarRanking, 15000);

        // ==========================================
        // 🌟 MÓDULO PWA E TELA CHEIA PARA A TV
        // ==========================================

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('Service Worker Registrado com sucesso:', registration.scope);
                }).catch((error) => {
                    console.log('Falha ao registrar o Service Worker:', error);
                });
            });
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao tentar tela cheia: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
