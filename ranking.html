<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXGYM - TV Ranking Ao Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#060709">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #FF5500;
            --bg: #060709;
            --bg-card: rgba(18, 20, 26, 0.75);
            --border: rgba(255,255,255,0.08);
            --gold: #FFD700;
            --silver: #E0E0E0;
            --bronze: #CD7F32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Fundo Animado e Dinâmico */
        body {
            font-family: 'Barlow', sans-serif;
            background: linear-gradient(-45deg, #060709, #1a0b04, #060709, #0d0602);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #fff;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
            width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(255,85,0,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        /* ======= HEADER ======= */
        .header { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 20px 3vw 15px; flex-shrink: 0; position: relative; z-index: 10; }
        .header-logo { width: 70px; height: 70px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,85,0,0.4); cursor: pointer; border: 2px solid rgba(255,85,0,0.2); }
        .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header-title span { color: var(--primary); text-shadow: 0 0 20px rgba(255,85,0,0.5); }
        .header-subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 5px; text-transform: uppercase; margin-top: 5px; font-weight: 600; }
        
        .live-badge {
            position: absolute; right: 3vw; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 8px; background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 50px; padding: 10px 20px;
            font-size: 0.8rem; color: #00FF88; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .live-dot { width: 10px; height: 10px; background: #00FF88; border-radius: 50%; box-shadow: 0 0 10px #00FF88; animation: livePulse 1.5s ease-in-out infinite; }
        @keyframes livePulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px #00FF88; } }
        
        .header-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); margin: 0 5vw 20px; flex-shrink: 0; opacity: 0.4; z-index: 10; }

        /* ======= BARRA DE PESQUISA ======= */
        .search-container {
            display: flex; align-items: center; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 15px; margin: 0 3vw 20px;
            padding: 0 15px; height: 50px; z-index: 10; flex-shrink: 0; backdrop-filter: blur(10px);
        }
        .search-icon { color: var(--primary); font-size: 1.5rem; margin-right: 12px; }
        #input-pesquisa {
            flex: 1; background: transparent; border: none; color: #fff;
            font-family: 'Barlow', sans-serif; font-size: 1.1rem; outline: none; width: 100%; letter-spacing: 1px;
        }
        #input-pesquisa::placeholder { color: rgba(255,255,255,0.2); }

        /* ======= GRID DO RANKING (TV) ======= */
        .ranking-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px 50px; 
            padding: 0 4vw 90px; 
            flex: 1; 
            overflow-y: auto;
            align-content: start;
            z-index: 10;
        }
        .ranking-grid::-webkit-scrollbar { display: none; }

        /* ======= RANK CARD PREMIUM ======= */
        .rank-card {
            display: flex; align-items: center; gap: 15px; padding: 12px 20px 12px 15px;
            border-radius: 20px; background: var(--bg-card); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-left: 6px solid transparent; width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efeito de Cascata na Entrada */
        @keyframes cascadeIn {
            0% { opacity: 0; transform: translateX(-30px) scale(0.95); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        /* Pódio Iluminado */
        .rank-card.gold { 
            border-left-color: var(--gold); border: 1px solid rgba(255,215,0,0.3); border-left: 6px solid var(--gold);
            background: linear-gradient(90deg, rgba(255,215,0,0.1), rgba(18,20,26,0.8) 60%); 
            box-shadow: 0 10px 30px rgba(255,215,0,0.15); transform: scale(1.02);
        }
        .rank-card.silver { 
            border-left-color: var(--silver); border: 1px solid rgba(224,224,224,0.2); border-left: 6px solid var(--silver);
            background: linear-gradient(90deg, rgba(224,224,224,0.08), rgba(18,20,26,0.8) 60%); 
        }
        .rank-card.bronze { 
            border-left-color: var(--bronze); border: 1px solid rgba(205,127,50,0.2); border-left: 6px solid var(--bronze);
            background: linear-gradient(90deg, rgba(205,127,50,0.08), rgba(18,20,26,0.8) 60%); 
        }
        .rank-card.other { border-left-color: rgba(255,255,255,0.05); }

        .pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; width: 55px; text-align: center; flex-shrink: 0; color: rgba(255,255,255,0.1); }
        .rank-card.gold .pos-num { color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); font-size: 2.5rem; }
        .rank-card.silver .pos-num { color: var(--silver); text-shadow: 0 0 10px rgba(224,224,224,0.4); }
        .rank-card.bronze .pos-num { color: var(--bronze); text-shadow: 0 0 10px rgba(205,127,50,0.4); }

        .rank-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .rank-card.gold .rank-avatar { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .rank-card.silver .rank-avatar { border-color: var(--silver); }
        .rank-card.bronze .rank-avatar { border-color: var(--bronze); }

        .rank-avatar-placeholder { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,85,0,0.1); border: 2px solid rgba(255,85,0,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; color: var(--primary); flex-shrink: 0; }
        .rank-card.gold .rank-avatar-placeholder { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.4); background: rgba(255,215,0,0.1); }

        .rank-name {
            flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; color: #FFFFFF;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .rank-points { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 8px 18px; flex-shrink: 0; min-width: 90px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .pts-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; color: var(--primary); line-height: 0.9; text-shadow: 0 0 15px rgba(255,85,0,0.4); }
        .pts-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 2px; }

        .rank-card.gold .pts-value { color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* ======= SCROLLING BAR ======= */
        #scroll-bar { position: fixed; bottom: 0; left: 0; width: 100vw; height: 65px; background: rgba(6,7,9,0.95); border-top: 2px solid rgba(255,85,0,0.3); display: none; align-items: center; overflow: hidden; z-index: 100; backdrop-filter: blur(10px); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #scroll-content { display: inline-flex; align-items: center; white-space: nowrap; padding-left: 100vw; animation: scrollLeft linear infinite; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .scroll-item { display: inline-flex; align-items: center; gap: 14px; margin-right: 120px; }
        .scroll-pos { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900; color: rgba(255,255,255,0.2); }
        .scroll-photo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,85,0,0.3); }
        .scroll-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.7); }
        .scroll-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(255,85,0,0.3); }
        .scroll-sep { color: rgba(255,255,255,0.1); margin: 0 25px; }

        @media (max-width: 800px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .header { padding: 15px; justify-content: flex-start; gap: 15px; }
            .header-logo { width: 50px; height: 50px; }
            .header-title { font-size: 2.2rem; }
            .live-badge { display: none; }
            .search-container { margin: 0 15px 15px; }
            .ranking-grid { grid-template-columns: 1fr; gap: 12px; padding: 0 15px 20px 15px; }
            .rank-card { padding: 10px 12px; gap: 10px; width: 100%; border-radius: 15px; }
            .pos-num { font-size: 1.8rem; width: 40px; }
            .rank-card.gold .pos-num { font-size: 2rem; }
            .rank-avatar, .rank-avatar-placeholder { width: 45px; height: 45px; font-size: 1.2rem;}
            .rank-name { font-size: 1.15rem; white-space: normal; word-break: break-word; line-height: 1.1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
            .rank-points { min-width: 70px; padding: 6px 10px; }
            .pts-value { font-size: 1.8rem; }
            #scroll-bar { display: none !important; }
        }

        /* Estilo para a tela de patrocínios (Ocupa a TV inteira) */
.digital-signage {
    display: none; /* Começa invisível */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #111827; /* Fundo escuro premium */
    z-index: 9999;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease-in-out; /* Efeito de transição suave */
}

/* Quando adicionarmos essa classe, a tela aparece suavemente */
.digital-signage.show {
    opacity: 1;
}

/* Estilo para a logomarca */
#logo-patrocinador {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
    animation: pulse 4s infinite; /* Pequeno efeito de pulso na logo (opcional) */
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
    </style>
</head>
<body>

    <div id="tela-ranking">
        </div>

    <div id="tela-patrocinadores" class="digital-signage">
        <img id="logo-patrocinador" src="" alt="Patrocinador">
    </div>

    <div class="header">
        <img src="logo.jpeg" class="header-logo" alt="Logo" onclick="toggleFullScreen()" onerror="this.style.display='none'">
        <div>
            <div class="header-title">TOP<span>10 DO MÊS</span></div>
            <div class="header-subtitle">Pontos = Catraca + Treinos App</div>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            Ao Vivo
        </div>
    </div>

    <div class="header-divider"></div>

    <div class="search-container">
        <span class="material-icons search-icon">search</span>
        <input type="text" id="input-pesquisa" placeholder="Pesquisar atleta..." oninput="filtrarRanking()">
    </div>

    <div class="ranking-grid" id="board">
        <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--primary); font-family:'Barlow Condensed',sans-serif; padding-top: 80px; text-shadow: 0 0 20px rgba(255,85,0,0.3);">
            <div style="font-size:3rem; margin-bottom:10px; animation: livePulse 1s infinite;">⚡</div>
            <div style="font-size:1.8rem; letter-spacing:3px; font-weight:900;">SINCRONIZANDO CÉREBRO MAX...</div>
        </div>
    </div>

    <div id="scroll-bar">
        <div id="scroll-content"></div>
    </div>

    <script>
        // =========================================================
        // ⚙️ 1. CONFIGURAÇÕES BASE
        // =========================================================
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        
        // 🔥 INICIAÇÃO DO FIREBASE
        const firebaseConfig = {
            databaseURL: "https://max-catraca-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let dadosGlobais = [];

        // =========================================================
        // 📊 2. LÓGICA DO RANKING
        // =========================================================
        async function carregarRanking() {
            try {
                const res = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`);
                dadosGlobais = await res.json();
                filtrarRanking();
            } catch(e) { console.error("Erro ao carregar ranking:", e); }
        }

        function filtrarRanking() {
            const termo = document.getElementById('input-pesquisa').value.toLowerCase();
            const board = document.getElementById('board');
            const scrollBar = document.getElementById('scroll-bar');
            const scrollContent = document.getElementById('scroll-content');
            
            let filtrados = dadosGlobais;
            if (termo !== "") filtrados = dadosGlobais.filter(a => a.nome.toLowerCase().includes(termo));

            if (!filtrados.length) {
                board.innerHTML = `<div style="grid-column:1/-1; display:flex; justify-content:center; padding-top: 80px; color:rgba(255,255,255,0.2); font-family:'Barlow Condensed',sans-serif; font-size:1.8rem; letter-spacing:2px; font-weight:700;">NENHUM ATLETA ENCONTRADO</div>`;
                scrollBar.style.display = 'none';
                return;
            }

            let exibirGrid = [];
            let exibirScroll = [];

            if (termo === "") {
                if (window.innerWidth > 800) {
                    const top10 = filtrados.slice(0, 10);
                    for (let i = 0; i < 5; i++) {
                        if (top10[i]) exibirGrid.push(top10[i]);
                        if (top10[i + 5]) exibirGrid.push(top10[i + 5]);
                    }
                    exibirScroll = filtrados.slice(10);
                } else {
                    exibirGrid = filtrados;
                    exibirScroll = [];
                }
            } else {
                exibirGrid = filtrados.slice(0, 30);
                exibirScroll = [];
            }

            let html = '';
            exibirGrid.forEach((aluno, i) => {
                let cls = 'other';
                if (aluno.posicao == 1) cls = 'gold';
                else if (aluno.posicao == 2) cls = 'silver';
                else if (aluno.posicao == 3) cls = 'bronze';

                const temFoto = aluno.foto && aluno.foto.trim();
                const inicialNome = aluno.nome.charAt(0);

                const fotoHtml = temFoto
                    ? `<img src="${aluno.foto}" class="rank-avatar" alt="${aluno.nome}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="rank-avatar-placeholder" style="display:none;">${inicialNome}</div>`
                    : `<div class="rank-avatar-placeholder">${inicialNome}</div>`;

                // Adiciona o atraso da animação (0.08s vezes a posição na grelha)
                const delay = (i * 0.08).toFixed(2);

                html += `
                <div class="rank-card ${cls}" style="animation: cascadeIn 0.5s ease-out ${delay}s both;">
                    <div class="pos-num">${aluno.posicao}º</div>
                    ${fotoHtml}
                    <div class="rank-name" title="${aluno.nome}">${aluno.nome}</div>
                    <div class="rank-points">
                        <div class="pts-value">${aluno.pontos}</div>
                        <div class="pts-label">pts</div>
                    </div>
                </div>`;
            });
            board.innerHTML = html;

            if (exibirScroll.length > 0 && window.innerWidth > 800) {
                let scrollHtml = '';
                [exibirScroll, exibirScroll].forEach(lista => {
                    lista.forEach(aluno => {
                        const fotoEl = aluno.foto ? `<img src="${aluno.foto}" class="scroll-photo" alt="">` : '';
                        scrollHtml += `
                        <div class="scroll-item">
                            <span class="scroll-pos">${aluno.posicao}º</span>
                            ${fotoEl}
                            <span class="scroll-name">${aluno.nome}</span>
                            <span class="scroll-pts">${aluno.pontos} pts</span>
                        </div>
                        <span class="scroll-sep">•</span>`;
                    });
                });
                scrollContent.innerHTML = scrollHtml;
                const dur = Math.max(30, exibirScroll.length * 4);
                scrollContent.style.animationDuration = `${dur}s`;
                scrollBar.style.display = 'flex';
            } else {
                scrollBar.style.display = 'none';
            }
        }

        // =========================================================
        // 🚀 3. ATUALIZAÇÃO SILENCIOSA AO VIVO (FIREBASE)
        // =========================================================
        database.ref('acessos').on('child_added', (snapshot) => {
            const chaveFirebase = snapshot.key;
            carregarRanking();
            setTimeout(() => { database.ref('acessos/' + chaveFirebase).remove(); }, 15000);
        });

        // =========================================================
        // 🔄 4. FUNÇÕES EXTRAS E INICIALIZAÇÃO
        // =========================================================
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Erro ao tentar entrar em ecrã inteiro: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.onload = () => {
            carregarRanking();
            setInterval(carregarRanking, 300000); 
        };

        // Função auxiliar que pausa a execução pelo tempo determinado (em milissegundos)
const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

async function iniciarDigitalSignage() {
    const telaRanking = document.getElementById('tela-ranking');
    const telaAds = document.getElementById('tela-patrocinadores');
    const imgLogo = document.getElementById('logo-patrocinador');

    // Suas logos (Coloque a URL correta das imagens que você vai usar)
    const patrocinadores = [
        "https://sua-url.com/logo-willweb.png", // Imagem 1
        "https://sua-url.com/logo-powerfisio.png" // Imagem 2
    ];

    // Loop infinito para rodar na TV o dia todo
    while (true) {
        // PASSO 1: Mostra o Ranking por 1 Minuto (60.000 milissegundos)
        telaAds.classList.remove('show'); // Tira a opacidade
        await sleep(1000); // Espera 1 seg para a transição terminar antes de dar display: none
        telaAds.style.display = 'none';
        
        // Fica no ranking por 60 segundos
        await sleep(60000); 

        // PASSO 2: Prepara a tela de Patrocinadores
        telaAds.style.display = 'flex';
        // Pequeno delay para o navegador registrar o display: flex antes de aplicar a opacidade
        await sleep(50); 
        telaAds.classList.add('show');

        // PASSO 3: Roda cada patrocinador por 10 segundos
        for (let i = 0; i < patrocinadores.length; i++) {
            // Se não for a primeira imagem, faz um pequeno piscar para trocar de logo
            if (i > 0) {
                imgLogo.style.opacity = 0;
                await sleep(500);
            }
            
            imgLogo.src = patrocinadores[i];
            imgLogo.style.opacity = 1;
            
            // Fica mostrando a logo por 10 segundos (10.000 milissegundos)
            await sleep(10000); 
        }
        
        // Após mostrar todas as logos, o loop while(true) recomeça, voltando pro ranking!
    }
}

// Inicia o motor de publicidade assim que a página carregar
window.addEventListener('load', () => {
    // Aqui você pode manter as suas outras funções (como a de carregar o ranking)
    // carregarRankingNaTela(); 
    
    // Dispara a rotação de telas
    iniciarDigitalSignage();
});
    </script>
</body>
</html>
