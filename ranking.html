<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXGYM - Ranking TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,900;1,800;1,900&family=Barlow:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest-tv.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg-dark: #050505;
            --brand-orange: #ff6600;
            --brand-orange-light: #ffa133;
            --brand-white: #ffffff;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --text-main: #ffffff;
            --text-muted: #888888;
            --neon-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Barlow", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 0%, rgba(255, 102, 0, 0.15) 0%, transparent 60%),
                linear-gradient(to bottom, rgba(0,0,0,0.8), #050505);
            z-index: -1;
        }

        .tv-layout {
            display: grid;
            grid-template-rows: 12vh 78vh 10vh;
            height: 100vh;
            width: 100vw;
        }

        /* ================= HEADER ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 3vw;
            border-bottom: 2px solid rgba(255, 102, 0, 0.3);
            background: linear-gradient(90deg, rgba(13,13,13,0.9) 0%, rgba(5,5,5,0.9) 100%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1.5vw;
        }

        .brand-logo {
            height: 8vh;
            border-radius: 8px;
            box-shadow: var(--neon-shadow);
            cursor: pointer;
        }

        .brand-text h1 {
            font-family: "Barlow Condensed", sans-serif;
            font-style: italic;
            font-size: 4.5vh;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--brand-white), var(--brand-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text p {
            font-size: 1.8vh;
            color: var(--brand-orange-light);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 2vw;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            background: rgba(255, 102, 0, 0.15);
            padding: 0.5vh 1vw;
            border-radius: 50px;
            border: 1px solid var(--brand-orange);
            font-weight: 800;
            font-size: 2vh;
            color: var(--brand-orange-light);
            text-transform: uppercase;
            animation: pulse-border 2s infinite;
        }

        .live-dot {
            width: 1.2vh;
            height: 1.2vh;
            background-color: var(--brand-orange);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .clock {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 5vh;
            font-weight: 900;
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
            display: grid;
            grid-template-columns: 45% 55%;
            padding: 2vh 2vw;
            gap: 3vw;
        }

        /* Pódio (Esquerda) */
        .podium-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2vh;
        }

        .podium-card {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(10,10,10,0.9));
            border-radius: 16px;
            padding: 2vh 2vw;
            gap: 2vw;
            position: relative;
            overflow: hidden;
            border-left: 6px solid var(--medal-color);
        }

        .podium-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05));
            pointer-events: none;
        }

        .podium-card.first {
            --medal-color: var(--gold);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(10,10,10,0.95));
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
            padding: 3vh 2vw;
        }

        .podium-card.second { --medal-color: var(--silver); }
        .podium-card.third { --medal-color: var(--bronze); }

        .pos-badge {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 7vh;
            font-weight: 900;
            font-style: italic;
            color: var(--medal-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            width: 8vh;
            text-align: center;
        }

        .podium-card.first .pos-badge { font-size: 10vh; }

        .athlete-info {
            display: flex;
            align-items: center;
            gap: 1.5vw;
        }

        .avatar {
            width: 9vh;
            height: 9vh;
            border-radius: 50%;
            border: 3px solid var(--medal-color);
            object-fit: cover;
            background-color: #222;
        }

        .podium-card.first .avatar {
            width: 13vh;
            height: 13vh;
            border-width: 4px;
        }

        .athlete-name {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .podium-card.first .athlete-name { font-size: 6vh; color: var(--gold); }

        .athlete-points { text-align: right; }

        .points-val {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 6vh;
            font-weight: 900;
            color: var(--brand-white);
        }

        .podium-card.first .points-val { font-size: 8vh; }

        .points-lbl {
            font-size: 1.5vh;
            color: var(--brand-orange-light);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* Lista de Classificação (Direita) */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            justify-content: center;
        }

        .list-row {
            display: grid;
            grid-template-columns: 5vh 7vh 1fr auto;
            align-items: center;
            background: rgba(20, 20, 20, 0.7);
            border-radius: 8px;
            padding: 1vh 1.5vw;
            gap: 1.5vw;
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--brand-orange);
            transform: skewX(-5deg);
        }

        .list-row > * { transform: skewX(5deg); }

        .row-pos {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh;
            font-weight: 900;
            color: var(--text-muted);
            text-align: center;
        }

        .row-avatar {
            width: 6vh;
            height: 6vh;
            border-radius: 50%;
            border: 2px solid var(--brand-orange);
            object-fit: cover;
        }

        .row-name {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3.5vh;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-points {
            font-family: "Barlow Condensed", sans-serif;
            font-size: 4vh;
            font-weight: 900;
            color: var(--brand-orange-light);
        }

        /* ================= TICKER FOOTER ================= */
        .ticker {
            background: var(--brand-orange);
            color: #000;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 -5px 20px rgba(255, 102, 0, 0.4);
        }

        .ticker-label {
            background: #000;
            color: var(--brand-white);
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 2vw;
            font-weight: 900;
            font-size: 2.5vh;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            border-right: 4px solid var(--brand-white);
        }

        .ticker-track {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            padding-left: 100vw;
            animation: tickerMove linear infinite;
        }

        @keyframes tickerMove {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 1vw;
            margin-right: 4vw;
            font-family: "Barlow Condensed", sans-serif;
            font-size: 3.5vh;
            font-weight: 800;
            text-transform: uppercase;
        }

        .ticker-pos { color: #000; font-weight: 900; }
        .ticker-name { color: #1a1a1a; }
        .ticker-pts { color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* ================= DIGITAL SIGNAGE ================= */
        .digital-signage {
            position: fixed;
            inset: 0;
            background-color: #07090c;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .digital-signage.show { opacity: 1; }
        #logo-patrocinador {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        /* UI States */
        .state-panel {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 3vh;
            font-family: "Barlow Condensed", sans-serif;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Animações */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 102, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="tela-patrocinadores" class="digital-signage">
        <img id="logo-patrocinador" src="" alt="Patrocinador">
    </div>

    <main class="tv-layout">
        
        <header class="header">
            <div class="brand">
                <img src="logo (1).jpeg" class="brand-logo" alt="MAXGYM" onclick="toggleFullScreen()" onerror="this.style.display='none'">
                <div class="brand-text">
                    <h1>MAXGYM</h1>
                    <p>Catraca + Treinos</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="live-indicator">
                    <span class="live-dot"></span> Ao Vivo
                </div>
                <div class="clock" id="clock">--:--</div>
            </div>
        </header>

        <section class="main-content">
            <div class="podium-container" id="podium-area">
                <div class="state-panel">Sincronizando dados dos atletas...</div>
            </div>

            <div class="list-container" id="list-area">
                <div class="state-panel">O ranking aparecerá em instantes</div>
            </div>
        </section>

        <footer class="ticker">
            <div class="ticker-label">Demais posições</div>
            <div class="ticker-track" id="ticker-content"></div>
        </footer>

    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";
        const REFRESH_MS = 15000;

        let dadosGlobais = [];

        const els = {
            podium: document.getElementById("podium-area"),
            list: document.getElementById("list-area"),
            ticker: document.getElementById("ticker-content"),
            clock: document.getElementById("clock")
        };

        // ====== UTILITÁRIOS ORIGINAIS ======
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getName(aluno) {
            const nome = String(aluno?.nome ?? "").trim();
            return nome || "Atleta";
        }

        function numericPoints(value) {
            if (typeof value === "number") return Number.isFinite(value) ? value : 0;
            const raw = String(value ?? "0").trim();
            const normalized = raw
                .replace(/[^\d,.-]/g, "")
                .replace(/\.(?=\d{3}(\D|$))/g, "")
                .replace(",", ".");
            const number = Number(normalized);
            return Number.isFinite(number) ? number : 0;
        }

        function formatPoints(value) {
            const number = numericPoints(value);
            if (number > 0 || String(value ?? "").trim() === "0") {
                return new Intl.NumberFormat("pt-BR").format(number);
            }
            return String(value ?? "0");
        }

        function getPosition(aluno, fallback) {
            const pos = Number(aluno?.posicao);
            return Number.isFinite(pos) && pos > 0 ? pos : fallback;
        }

        function getAvatar(aluno) {
            const foto = String(aluno?.foto ?? "").trim();
            if(foto) return escapeHtml(foto);
            
            const initial = (Array.from(getName(aluno).trim())[0] || "A").toUpperCase();
            return `https://ui-avatars.com/api/?name=${initial}&background=ff6600&color=fff&bold=true&size=128`;
        }

        // ====== RENDERIZADORES ======
        function renderPodium(topThree) {
            if (!topThree.length) {
                els.podium.innerHTML = `<div class="state-panel">Nenhum atleta foi encontrado</div>`;
                return;
            }

            const ranks = ["first", "second", "third"];
            let html = "";

            topThree.forEach((aluno, index) => {
                const pos = getPosition(aluno, index + 1);
                html += `
                <div class="podium-card ${ranks[index]}">
                    <div class="pos-badge">${pos}º</div>
                    <div class="athlete-info">
                        <img src="${getAvatar(aluno)}" class="avatar" alt="${escapeHtml(getName(aluno))}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'">
                        <div class="athlete-name">${escapeHtml(getName(aluno))}</div>
                    </div>
                    <div class="athlete-points">
                        <div class="points-val">${formatPoints(aluno.pontos)}</div>
                        <div class="points-lbl">Pts</div>
                    </div>
                </div>`;
            });

            els.podium.innerHTML = html;
        }

        function renderList(rows, offset) {
            if (!rows.length) {
                els.list.innerHTML = `<div class="state-panel">Novas posições aparecerão aqui</div>`;
                return;
            }

            let html = "";
            rows.forEach((aluno, index) => {
                const pos = getPosition(aluno, offset + index + 1);
                html += `
                <div class="list-row">
                    <div class="row-pos">${pos}º</div>
                    <img src="${getAvatar(aluno)}" class="row-avatar" alt="${escapeHtml(getName(aluno))}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'">
                    <div class="row-name">${escapeHtml(getName(aluno))}</div>
                    <div class="row-points">${formatPoints(aluno.pontos)} pts</div>
                </div>`;
            });
            els.list.innerHTML = html;
        }

        function renderTicker(rows, offset) {
            if (!rows.length) {
                els.ticker.innerHTML = "";
                return;
            }

            const html = [rows, rows].map((lista) => lista.map((aluno, index) => {
                const pos = getPosition(aluno, offset + index + 1);
                return `
                    <div class="ticker-item">
                        <span class="ticker-pos">${pos}º</span>
                        <span class="ticker-name">${escapeHtml(getName(aluno))}</span>
                        <span class="ticker-pts">${formatPoints(aluno.pontos)} pts</span>
                    </div>`;
            }).join("")).join("");

            els.ticker.innerHTML = html;
            els.ticker.style.animationDuration = `${Math.max(20, rows.length * 3.5)}s`;
        }

        // ====== LÓGICA DE DADOS ======
        async function carregarRanking() {
            try {
                const response = await fetch(`${API_URL}?acao=getRankingTV&t=${Date.now()}`, { cache: "no-store" });
                const payload = await response.json();
                dadosGlobais = Array.isArray(payload) ? payload : [];
                
                if (dadosGlobais.length > 0) {
                    renderPodium(dadosGlobais.slice(0, 3));
                    renderList(dadosGlobais.slice(3, 10), 3);
                    renderTicker(dadosGlobais.slice(10), 10);
                } else {
                    els.podium.innerHTML = `<div class="state-panel">Ranking vazio</div>`;
                    els.list.innerHTML = "";
                    els.ticker.innerHTML = "";
                }
            } catch (error) {
                console.error("Erro ao carregar ranking:", error);
            }
        }

        function updateClock() {
            const now = new Date();
            els.clock.textContent = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        // ====== DIGITAL SIGNAGE / PATROCINADORES ======
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function iniciarDigitalSignage() {
            const telaAds = document.getElementById('tela-patrocinadores');
            const imgLogo = document.getElementById('logo-patrocinador');

            const patrocinadores = [
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/willweb.png",
                "https://raw.githubusercontent.com/willappsoficial-glitch/agente_ia_powerfisio/main/anuncio.png"
            ];

            while (true) {
                telaAds.classList.remove('show');
                await sleep(1000); 
                telaAds.style.display = 'none';

                await sleep(60000); 

                telaAds.style.display = 'flex';
                await sleep(50);
                telaAds.classList.add('show');

                for (let i = 0; i < patrocinadores.length; i++) {
                    if (i > 0) {
                        imgLogo.style.opacity = 0;
                        await sleep(500);
                    }
                    imgLogo.src = patrocinadores[i];
                    imgLogo.style.opacity = 1;
                    
                    await sleep(10000);
                }
            }
        }

        // ====== BOOT ======
        updateClock();
        window.setInterval(updateClock, 1000);
        
        carregarRanking();
        window.setInterval(carregarRanking, REFRESH_MS);

        window.setTimeout(iniciarDigitalSignage, 5000);

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
