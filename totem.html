<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem Powerfisio - Max IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5500;
            --primary-glow: rgba(255,85,0,0.4);
            --bg: #060709;
            --bg-card: #0D0F14;
            --bg-surface: #13161E;
            --border: rgba(255,255,255,0.06);
            --text: #FFFFFF;
            --muted: #6B7280;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ======= SCREEN SYSTEM ======= */
        .tela {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .tela.oculta { opacity: 0; pointer-events: none; }
        .tela.visivel { opacity: 1; pointer-events: all; }

        /* ======= STANDBY SCREEN ======= */
        #tela-espera {
            flex-direction: column;
            align-items: center;
            gap: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(255,85,0,0.07) 0%, transparent 60%);
        }

        .logo-container {
            margin-bottom: 48px;
            position: relative;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            box-shadow: 0 16px 48px rgba(255,85,0,0.3);
        }

        /* Pulse rings */
        .pulse-rings {
            position: absolute;
            inset: -40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,85,0,0.3);
            animation: expandRing 3s ease-out infinite;
        }

        .pulse-ring:nth-child(1) { width: 140px; height: 140px; animation-delay: 0s; }
        .pulse-ring:nth-child(2) { width: 190px; height: 190px; animation-delay: 0.8s; }
        .pulse-ring:nth-child(3) { width: 240px; height: 240px; animation-delay: 1.6s; }

        @keyframes expandRing {
            0% { opacity: 0.6; transform: scale(0.8); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .standby-brand {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.9;
            text-align: center;
            margin-bottom: 16px;
        }

        .standby-brand span { color: var(--primary); }

        .standby-sub {
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 64px;
        }

        .standby-instruction {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 32px;
        }

        .standby-instruction .icon {
            width: 32px;
            height: 32px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .standby-instruction span {
            color: var(--muted);
            font-size: 1rem;
        }

        /* Scan bar animation */
        .scan-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scanAnim 3s ease-in-out infinite;
            opacity: 0.4;
        }

        @keyframes scanAnim {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        /* DEV Button */
        .dev-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 100;
        }

        /* ======= ALUNO SCREEN ======= */
        #tela-aluno {
            flex-direction: column;
            align-items: center;
            padding: 60px;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,85,0,0.08) 0%, transparent 50%);
            position: relative;
        }

        /* Botão Sair Rápido */
        .btn-fechar {
            position: absolute;
            top: 40px;
            right: 40px;
            background: transparent;
            border: 2px solid var(--border);
            color: var(--muted);
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-fechar:hover {
            color: white;
            border-color: white;
            background: rgba(255,255,255,0.1);
        }

        .btn-fechar:active {
            transform: scale(0.95);
        }

        /* Foto / Placeholder */
        .foto-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .foto-perfil, .foto-placeholder {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 40px rgba(255,85,0,0.35);
        }

        .foto-perfil { object-fit: cover; }

        .foto-placeholder {
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
        }

        .saudacao {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 8px;
            animation: fadeSlideIn 0.4s ease-out;
        }

        .saudacao span { color: var(--primary); }

        .subtitulo-aluno {
            font-size: 1.1rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
            animation: fadeSlideIn 0.4s ease-out 0.1s both;
        }

        .subtitulo-aluno strong { color: var(--text); }

        /* ======= MENU PRINCIPAL OTIMIZADO ======= */
        .area-principal {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px; /* Mais estreito para focar o botão */
            animation: fadeSlideIn 0.4s ease-out 0.2s both;
        }

        .btn-max {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #FF8C00);
            border: none;
            border-radius: 24px;
            padding: 30px 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 16px 40px rgba(255,85,0,0.4);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-max:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(255,85,0,0.6);
        }

        .btn-max:active { transform: scale(0.98); }

        .btn-icon-max {
            font-size: 3.5rem;
            line-height: 1;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* Banner da Roleta */
        .roleta-banner {
            width: 100%;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.05);
        }

        .roleta-icone {
            font-size: 2.2rem;
            animation: bounce 2s infinite;
        }

        .roleta-texto {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text);
        }

        .roleta-texto strong {
            color: var(--gold);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Seletor de dias */
        .grid-dias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 600px;
            animation: fadeSlideIn 0.3s ease-out;
        }

        .btn-dia {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 24px 10px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-dia:hover { border-color: var(--primary); background: rgba(255,85,0,0.05); transform: translateY(-3px); }
        .btn-dia:active { transform: scale(0.95); }

        /* LOADING */
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,85,0,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
        }

        /* ======= ÁREA DE IMPRESSÃO ======= */
        @media print {
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible !important; }
            #area-impressao {
                position: fixed;
                inset: 0;
                background: white;
                color: black;
                padding: 20px;
                font-family: 'Courier New', monospace;
                font-size: 12px;
            }
        }

        #area-impressao { display: none; }
    </style>
</head>
<body>

    <!-- TELA DE ESPERA -->
    <div id="tela-espera" class="tela visivel">
        <div class="scan-line"></div>

        <div class="logo-container">
            <div class="pulse-rings">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
            </div>
            <img src="logo.jpeg" alt="Logo" onerror="this.style.display='none'">
        </div>

        <div class="standby-brand">POWER<span>FISIO</span></div>
        <div class="standby-sub">Personal IA • Max System</div>

        <div class="standby-instruction">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
            </svg>
            <span>Passe na catraca para iniciar</span>
        </div>
    </div>

    <!-- TELA DO ALUNO -->
    <div id="tela-aluno" class="tela oculta">
        <!-- Botão Novo de Fechamento Imediato -->
        <button class="btn-fechar" onclick="resetarTela()">X SAIR</button>

        <div class="foto-wrapper">
            <img id="foto-aluno" class="foto-perfil" style="display:none;" src="" alt="">
            <div id="foto-placeholder" class="foto-placeholder" style="display:none;"></div>
        </div>

        <div class="saudacao">FALA, <span id="nome-aluno">ATLETA</span>!</div>
        <div class="subtitulo-aluno" id="txt-instrucao">A SUA MISSÃO ESTÁ PRONTA</div>

        <!-- Menu Principal Otimizado (Apenas MAX + Roleta) -->
        <div class="area-principal" id="menu-principal">
            <button class="btn-max" onclick="abrirSeletorDias()">
                <span class="btn-icon-max">🤖</span>
                IMPRIMIR TREINO MAX
            </button>
            
            <div class="roleta-banner">
                <div class="roleta-icone">🎰</div>
                <div class="roleta-texto">
                    Abra o <strong>App Powerfisio</strong> ao final do treino e gire a roleta para ganhar <strong>ATÉ +15 PONTOS EXTRAS!</strong>
                </div>
            </div>
        </div>

        <!-- Seletor de Dias -->
        <div class="grid-dias" id="seletor-dias" style="display:none;">
            <button class="btn-dia" onclick="gerarTreinoIA('Segunda')">SEG</button>
            <button class="btn-dia" onclick="gerarTreinoIA('Terça')">TER</button>
            <button class="btn-dia" onclick="gerarTreinoIA('Quarta')">QUA</button>
            <button class="btn-dia" onclick="gerarTreinoIA('Quinta')">QUI</button>
            <button class="btn-dia" onclick="gerarTreinoIA('Sexta')">SEX</button>
            <button class="btn-dia" style="border-color:rgba(255,255,255,0.15);" onclick="voltarMenu()">← VOLTAR</button>
        </div>

        <!-- Loading -->
        <div class="loading-container" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">MAX MONTANDO SEU TREINO...</div>
        </div>
    </div>

    <!-- DEV Button -->
    <button class="dev-btn" onclick="simularPassagemCatraca('Williano Teste', '999', 3)">
        Simular [DEV]
    </button>

    <!-- Área de Impressão -->
    <div id="area-impressao">
        <div style="text-align:center; margin-bottom: 10px;">
            <strong style="font-size:18px;">POWERFISIO</strong>
        </div>
        <div style="border-bottom: 1px dashed #000; margin-bottom: 10px; padding-bottom: 8px; font-size: 11px;">
            Aluno: <span id="print-nome">—</span>
        </div>
        <strong id="texto-impresso" style="display:block; margin-bottom: 8px; font-size: 14px;"></strong>
        <pre id="corpo-treino" style="font-size: 12px; white-space: pre-wrap; font-family: monospace; margin-bottom: 16px;"></pre>
        <div style="border-top: 1px dashed #000; padding-top: 8px; font-size: 11px; text-align: center;">
            Bom treino! 💪 — Powerfisio
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby62vambopzAU-hOp4Och0Qg9_ZOxNCqqo19BFZvUA13OFTYBRMnTnNckq3aBzncXKTJg/exec";

        let timeoutReset;
        let radarAtivo = true;
        let alunoAtualId = "";
        
        // NOVO: Tempo cravado em 5 segundos! Super ágil.
        const TEMPO_LIBERACAO = 5000; 

        // Polling Inteligente
        window.onload = () => {
            iniciarRadarInteligente();
        };

        async function iniciarRadarInteligente() {
            if (radarAtivo) {
                await escutarCatraca();
            }
            // Só faz a próxima chamada APÓS a anterior ter terminado, evitando gargalos
            setTimeout(iniciarRadarInteligente, 1200);
        }

        function formatarNome(nomeCompleto) {
            if (!nomeCompleto) return "Atleta";
            const partes = nomeCompleto.trim().split(" ");
            let nome = capitalize(partes[0]);
            if (partes.length >= 2) {
                const seg = partes[1].toLowerCase();
                if (["de","da","do","dos","das"].includes(seg)) {
                    if (partes.length >= 3) nome += " " + capitalize(partes[2]);
                } else {
                    nome += " " + capitalize(partes[1]);
                }
            }
            return nome;
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        async function escutarCatraca() {
            try {
                const res = await fetch(`${API_URL}?acao=radar&t=${Date.now()}`);
                const dados = await res.json();
                if (dados.detectado) {
                    radarAtivo = false;
                    mostrarAluno(dados.nome, dados.idAluno, dados.posicao, dados.foto);
                }
            } catch(e) {
                // Falha silenciosa
            }
        }

        function mostrarAluno(nomeCompleto, idAluno, posicao, foto) {
            const nome = formatarNome(nomeCompleto);
            alunoAtualId = idAluno;

            // Foto
            const imgEl = document.getElementById('foto-aluno');
            const placeholderEl = document.getElementById('foto-placeholder');

            if (foto && foto.trim()) {
                imgEl.src = foto;
                imgEl.style.display = 'block';
                placeholderEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                placeholderEl.textContent = nome.charAt(0).toUpperCase();
                placeholderEl.style.display = 'flex';
            }

            document.getElementById('nome-aluno').textContent = nome;
            document.getElementById('print-nome').textContent = nome;

            // Mensagem de ranking
            const instr = document.getElementById('txt-instrucao');
            if (posicao) {
                const medalhas = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const medalha = medalhas[posicao] || '🏅';
                instr.innerHTML = `${medalha} VOCÊ É O <strong>${posicao}º</strong> NO RANKING! BORA SUBIR MAIS?`;
            } else {
                instr.textContent = "A SUA MISSÃO ESTÁ PRONTA!";
            }

            // Transição de telas
            document.getElementById('tela-espera').classList.replace('visivel', 'oculta');
            document.getElementById('tela-aluno').classList.replace('oculta', 'visivel');

            // Timeout ágil de 5s
            clearTimeout(timeoutReset);
            timeoutReset = setTimeout(resetarTela, TEMPO_LIBERACAO);
        }

        function simularPassagemCatraca(nome, id, pos = 5) {
            radarAtivo = false;
            mostrarAluno(nome, id, pos, "");
        }

        function abrirSeletorDias() {
            document.getElementById('menu-principal').style.display = 'none';
            document.getElementById('seletor-dias').style.display = 'grid';
            document.getElementById('txt-instrucao').textContent = "IMPRIMIR O TREINO DE QUAL DIA?";
            
            // Dá mais 5 segundos para ele escolher o dia
            clearTimeout(timeoutReset);
            timeoutReset = setTimeout(resetarTela, TEMPO_LIBERACAO);
        }

        function voltarMenu() {
            document.getElementById('seletor-dias').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'flex';
            document.getElementById('txt-instrucao').textContent = "A SUA MISSÃO ESTÁ PRONTA!";
            
            clearTimeout(timeoutReset);
            timeoutReset = setTimeout(resetarTela, TEMPO_LIBERACAO);
        }

        async function gerarTreinoIA(dia) {
            document.getElementById('seletor-dias').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'none';
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'flex';
            document.getElementById('txt-instrucao').textContent = "CONECTANDO AO CÉREBRO MAX...";

            clearTimeout(timeoutReset);

            try {
                const res = await fetch(`${API_URL}?acao=gerarTreinoMax&idAluno=${alunoAtualId}&dia=${dia}`);
                const dados = await res.json();
                loadingEl.style.display = 'none';

                if (dados.sucesso) {
                    imprimirTreino(dados.cabecalho, dados.conteudo);
                } else {
                    imprimirTreino("ERRO AO GERAR TREINO", dados.conteudo || "Erro desconhecido.");
                }
            } catch(e) {
                loadingEl.style.display = 'none';
                document.getElementById('txt-instrucao').textContent = "ERRO DE CONEXÃO. TENTE NOVAMENTE.";
                setTimeout(voltarMenu, 3000);
            }
        }

        function imprimirTreino(titulo, conteudo = "") {
            clearTimeout(timeoutReset);
            document.getElementById('area-impressao').style.display = 'block';
            document.getElementById('texto-impresso').textContent = titulo;
            document.getElementById('corpo-treino').textContent = conteudo;

            setTimeout(() => {
                window.print();
                document.getElementById('area-impressao').style.display = 'none';
                resetarTela();
            }, 500);
        }

        function resetarTela() {
            document.getElementById('tela-aluno').classList.replace('visivel', 'oculta');
            document.getElementById('tela-espera').classList.replace('oculta', 'visivel');
            
            // Restaura o layout padrão para o próximo aluno
            document.getElementById('menu-principal').style.display = 'flex';
            document.getElementById('seletor-dias').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('txt-instrucao').textContent = "A SUA MISSÃO ESTÁ PRONTA!";
            
            radarAtivo = true; // Libera o totem para ler a próxima catraca
        }
    </script>
</body>
</html>
