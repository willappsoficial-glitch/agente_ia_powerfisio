<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem Powerfisio - Max IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5500;
            --bg-app: #F4F5F8;
            --text-main: #1D1D21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Zero rolagem */
        }

        /* TELA 1: AGUARDANDO CATRACA */
        #tela-espera {
            text-align: center;
            display: flex; /* Visível por padrão */
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .radar {
            width: 120px;
            height: 120px;
            background: rgba(255, 85, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        .radar h1 { font-size: 3rem; color: var(--primary); margin: 0;}

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 85, 0, 0.4); }
            70% { box-shadow: 0 0 0 50px rgba(255, 85, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 85, 0, 0); }
        }

        /* TELA 2: PERFIL DO ALUNO (Oculto por padrão) */
        #tela-aluno {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 1000px;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        .avatar-aluno {
            width: 150px;
            height: 150px;
            background: #E5E7EB;
            border-radius: 50%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        #tela-aluno h2 { font-size: 2.5rem; margin-bottom: 10px; }
        #tela-aluno p { font-size: 1.2rem; color: #666; margin-bottom: 40px; }

        /* GRADE DE BOTÕES GIGANTES */
        .grid-treinos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .btn-treino {
            background: white;
            border: 2px solid #E5E7EB;
            padding: 40px 20px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-treino.destaque {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 85, 0, 0.3);
        }

        .btn-treino:active { transform: scale(0.95); }
        .btn-treino span { font-size: 2.5rem; }

        /* Estilo invisível que só aparece no papel da impressora */
        @media print {
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { position: absolute; left: 0; top: 0; width: 100%; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="tela-espera">
        <div class="radar"><h1>PF</h1></div>
        <h2 style="font-size: 2rem; color: #333;">Aguardando Liberação...</h2>
        <p style="font-size: 1.2rem; color: #888;">Passe pela catraca para liberar seu treino</p>
        <button onclick="simularPassagemCatraca('Williano Teste', '123')" style="margin-top: 30px; padding: 10px; opacity: 0.2;">Simular Passagem (DEV)</button>
    </div>

    <div id="tela-aluno">
        <div class="avatar-aluno">👤</div>
        <h2>Fala, <span id="nome-aluno">Aluno</span>!</h2>
        <p>O que vamos treinar hoje?</p>

        <div class="grid-treinos">
            <button class="btn-treino" onclick="imprimirTreino('A')">
                <span>🏋️‍♂️</span> Treino A (Peito/Tríceps)
            </button>
            <button class="btn-treino" onclick="imprimirTreino('B')">
                <span>🦵</span> Treino B (Pernas)
            </button>
            <button id="btn-max" class="btn-treino destaque" data-idaluno="" onclick="imprimirTreino('MAX')">
                <span>🤖</span> Treino da Max IA
            </button>
        </div>
    </div>

    <div id="area-impressao" style="display: none;">
        <h3>Powerfisio - Treino</h3>
        <p id="texto-impresso"></p>
        <p>_______________________</p>
        <p>Bom treino!</p>
    </div>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwTMFXxeTYxMsH0aMmm0aXgqoqhSH06AbrIYvW-bI5x30g4pVRvehZIFiF6nbGvm_XQuA/exec"; // Mantenha sua URL com /exec
    let radarLigado = true;
    let ultimoIdDetectado = null;

    window.onload = () => setInterval(escutarCatraca, 3000);

    async function escutarCatraca() {
        if (!radarLigado) return;

        try {
            const carimbo = new Date().getTime();
            const res = await fetch(API_URL + "?acao=catraca&t=" + carimbo);
            const dados = await res.json();

            console.log("📡 Radar Powerfisio:", dados);

            if (dados.detectado && dados.idAluno !== ultimoIdDetectado) {
                console.log("✅ Novo aluno detectado:", dados.nome);
                ultimoIdDetectado = dados.idAluno;
                radarLigado = false;
                mostrarTelaAluno(dados.nome, dados.idAluno);
            }
        } catch (e) {
            console.error("❌ Erro na ponte de dados:", e);
        }
    }

    function mostrarTelaAluno(nome, idAluno) {
        try {
            const elEspera = document.getElementById('tela-espera');
            const elAluno = document.getElementById('tela-aluno');
            const elNome = document.getElementById('nome-aluno');
            const btnMax = document.getElementById('btn-max');

            if (!elEspera || !elAluno || !elNome || !btnMax) {
                console.error("🚨 ERRO CRÍTICO: Algum elemento (ID) sumiu do HTML!");
                return;
            }

            elEspera.style.display = 'none';
            elAluno.style.display = 'flex';
            elNome.innerText = nome;
            btnMax.setAttribute('data-idaluno', idAluno);

            setTimeout(resetarTela, 15000);
        } catch (err) {
            console.error("💥 Falha ao mudar a tela:", err);
        }
    }

    function resetarTela() {
        document.getElementById('tela-espera').style.display = 'flex';
        document.getElementById('tela-aluno').style.display = 'none';
        ultimoIdDetectado = null; // Limpa para permitir a próxima entrada
        radarLigado = true;
    }
</script>
</body>
</html>
